<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<!-- jsPDF -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
:root {
  --bg: #ffffff;
  --fg: #000000;
  --panel: #f2f2f2;
  --btn: #e0e0e0;
}
[data-theme="dark"] {
  --bg: #121212;
  --fg: #eaeaea;
  --panel: #1f1f1f;
  --btn: #2a2a2a;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: system-ui, sans-serif;
  margin: 10px;
}
h2 { margin-top: 0 }
button {
  background: var(--btn);
  color: var(--fg);
  border: 1px solid #888;
  padding: 4px 10px;
  cursor: pointer;
}
.row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}
canvas { max-width: 100% }

.modal {
  position: fixed;
  inset: 0;
  display: none;
  background: rgba(0,0,0,.55);
  align-items: center;
  justify-content: center;
}
.modal-content {
  background: var(--panel);
  padding: 16px;
  max-width: 480px;
  width: 90%;
}
hr { margin: 10px 0 }
</style>
</head>

<body>

<h2>Health Tracker</h2>

<!-- ROW 1 -->
<div class="row">
  <button id="btnRefresh">Refresh</button>
  <button id="btnFields">Select Fields</button>
  <button id="btnThresholds">Thresholds</button>
  <button id="btnAdd">Add Entry</button>
  <button id="btnOptions">Options</button>
</div>

<!-- ROW 2 -->
<div class="row">
  <button id="btnSaveCSV">Save CSV</button>
  <button id="btnSavePDF">Save PDF</button>
  <button id="btnImportCSV">Import CSV</button>
  <button id="btnTheme">Toggle Theme</button>
</div>

<canvas id="chart" height="120"></canvas>

<!-- ADD ENTRY -->
<div id="addModal" class="modal">
<div class="modal-content">
<h3>Add Entry</h3>
<label>Date <input type="date" id="eDate"></label><br>
<label>Field <input id="eField"></label><br>
<label>Value <input type="number" id="eValue"></label><br><br>
<button onclick="addEntry()">Save</button>
<button onclick="closeModal('addModal')">Close</button>
</div>
</div>

<!-- FIELD SELECT -->
<div id="fieldModal" class="modal">
<div class="modal-content">
<h3>Select Fields</h3>
<div id="fieldList"></div>
<hr>
<button onclick="deleteFields()">Delete Selected</button>
<button onclick="closeModal('fieldModal')">Close</button>
</div>
</div>

<!-- THRESHOLDS -->
<div id="thresholdModal" class="modal">
<div class="modal-content">
<h3>Thresholds</h3>
<label>Field <input id="tField"></label><br>
<label>Min <input type="number" id="tMin"></label><br>
<label>Max <input type="number" id="tMax"></label><br><br>
<button onclick="saveThreshold()">Save</button>
<hr>
<div id="thresholdList"></div>
<button onclick="closeModal('thresholdModal')">Close</button>
</div>
</div>

<!-- OPTIONS -->
<div id="optionsModal" class="modal">
<div class="modal-content">
<h3>Options</h3>
<p>UI, storage, and export options reserved.</p>
<button onclick="closeModal('optionsModal')">Close</button>
</div>
</div>

<input type="file" id="csvFile" accept=".csv" hidden>

<script>
/* =====================
   IndexedDB
===================== */
let db, chart;
const DB_NAME="healthTrackerDB", DB_VER=1;

indexedDB.open(DB_NAME,DB_VER).onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("entries",{keyPath:"id",autoIncrement:true});
  db.createObjectStore("thresholds",{keyPath:"field"});
};
indexedDB.open(DB_NAME,DB_VER).onsuccess=e=>{
  db=e.target.result;
  refresh();
};

/* =====================
   Helpers
===================== */
const getAll = s => new Promise(r=>{
  const tx=db.transaction(s,"readonly").objectStore(s).getAll();
  tx.onsuccess=()=>r(tx.result);
});
const showModal=id=>document.getElementById(id).style.display="flex";
const closeModal=id=>document.getElementById(id).style.display="none";

/* =====================
   Chart
===================== */
function buildChart(data){
  const dates=[...new Set(data.map(x=>x.date))].sort();
  const fields=[...new Set(data.map(x=>x.field))];

  const sets=fields.map(f=>({
    label:f,
    data:dates.map(d=>{
      const e=data.find(x=>x.field===f && x.date===d);
      return e?e.value:null;
    }),
    borderWidth:2
  }));

  chart && chart.destroy();
  chart=new Chart(chartEl,{
    type:"line",
    data:{labels:dates,datasets:sets},
    options:{
      plugins:{ legend:{labels:{color:"black"}}},
      scales:{
        x:{ticks:{color:"black"}},
        y:{ticks:{color:"black"}}
      }
    }
  });
}

/* =====================
   Actions
===================== */
async function refresh(){
  buildChart(await getAll("entries"));
}

async function addEntry(){
  db.transaction("entries","readwrite")
    .objectStore("entries")
    .add({date:eDate.value,field:eField.value,value:+eValue.value});
  closeModal("addModal");
  refresh();
}

async function openFields(){
  const e=await getAll("entries");
  fieldList.innerHTML="";
  [...new Set(e.map(x=>x.field))].forEach(f=>{
    fieldList.innerHTML+=`<label>
      <input type="checkbox" value="${f}">${f}</label><br>`;
  });
  showModal("fieldModal");
}

function deleteFields(){
  const boxes=[...fieldList.querySelectorAll("input:checked")];
  const os=db.transaction("entries","readwrite").objectStore("entries");
  os.openCursor().onsuccess=e=>{
    const c=e.target.result;
    if(c){
      if(boxes.some(b=>b.value===c.value.field)) c.delete();
      c.continue();
    }
  };
  closeModal("fieldModal");
  setTimeout(refresh,300);
}

async function saveThreshold(){
  db.transaction("thresholds","readwrite")
    .objectStore("thresholds")
    .put({field:tField.value,min:+tMin.value,max:+tMax.value});
  loadThresholds();
}
async function loadThresholds(){
  const t=await getAll("thresholds");
  thresholdList.innerHTML="";
  t.forEach(x=>{
    thresholdList.innerHTML+=`${x.field}: ${x.min}–${x.max}
    <button onclick="delTh('${x.field}')">✕</button><br>`;
  });
}
function delTh(f){
  db.transaction("thresholds","readwrite").objectStore("thresholds").delete(f);
  loadThresholds(); refresh();
}

/* =====================
   CSV / PDF
===================== */
async function saveCSV(){
  const e=await getAll("entries");
  const csv="date,field,value\n"+
    e.map(x=>`${x.date},${x.field},${x.value}`).join("\n");
  download(csv,"health-data.csv","text/csv");
}
function savePDF(){
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();
  pdf.text("Health Metrics",10,10);
  pdf.addImage(chart.toBase64Image(),"PNG",10,20,180,80);
  pdf.save("metrics.pdf");
}
function download(c,n,t){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([c],{type:t}));
  a.download=n; a.click();
}
csvFile.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    const os=db.transaction("entries","readwrite").objectStore("entries");
    r.result.split("\n").slice(1).forEach(l=>{
      const [d,f,v]=l.split(",");
      if(d&&f) os.add({date:d,field:f,value:+v});
    });
    refresh();
  };
  r.readAsText(e.target.files[0]);
};

/* =====================
   Wiring
===================== */
const chartEl=document.getElementById("chart");
btnRefresh.onclick=refresh;
btnFields.onclick=openFields;
btnThresholds.onclick=()=>{loadThresholds();showModal("thresholdModal")};
btnAdd.onclick=()=>showModal("addModal");
btnOptions.onclick=()=>showModal("optionsModal");
btnSaveCSV.onclick=saveCSV;
btnSavePDF.onclick=savePDF;
btnImportCSV.onclick=()=>csvFile.click();
btnTheme.onclick=()=>{
  document.body.dataset.theme=
   document.body.dataset.theme==="dark"?"":"dark";
};
</script>

</body>
</html>
