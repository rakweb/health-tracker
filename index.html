<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />

  <!-- ================= SAFE AUTO VERSIONING ================= -->
  <script>
    (function () {
      const version =
        localStorage.getItem('APP_VERSION') ||
        new Date().toISOString().slice(0,19).replace('T','_');

      localStorage.setItem('APP_VERSION', version);
      window.APP_VERSION = version;
    })();
  </script>

  <!-- ================= PWA ================= -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- ================= LOCAL CSS (VERSIONED SAFELY) ================= -->
  <link
    rel="stylesheet"
    href="./range-slider.css"
    id="range-css"
  >
  <script>
    document.getElementById('range-css').href += '?v=' + encodeURIComponent(APP_VERSION);
  </script>

  <!-- ================= LIBRARIES (✅ FIXED ✅) ================= -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
  https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js

  <!-- ================= YOUR ORIGINAL STYLES ================= -->
  <style>
    /* ✅ KEEP YOUR ENTIRE ORIGINAL STYLE BLOCK UNCHANGED */
  </style>
</head>

<body>

<header>
  <div class="wrap headbar">
    <div>
      <h1>Health Tracker</h1>
      <div class="small" id="appVersion"></div>
    </div>
    <div class="install">
      <button id="btnInstall" class="btn" style="display:none">Install</button>
      <button id="btnCheckUpdates" class="btn">Check for updates</button>
      <span id="installHint" class="small" style="color:#8aa0c3;"></span>
    </div>
  </div>
</header>

<main class="wrap">
  <!-- ✅ YOUR FULL EXISTING APP HTML (UNCHANGED) -->
</main>

<!-- ================= UPDATE TOAST ================= -->
<div id="updateToast" class="toast">
  <span>New version available.</span>
  <button id="btnReloadNow" class="btn ok">Reload now</button>
  <button id="btnDismissToast" class="btn">Later</button>
</div>

<!-- ================= VERSION DISPLAY ================= -->
<script>
  window.addEventListener('load', () => {
    const el = document.getElementById('appVersion');
    if (el) el.textContent = 'Version ' + APP_VERSION;
  });
</script>

<!-- ================= LOCAL JS (VERSIONED, ORDER SAFE) ================= -->
<script src="./range-slider.js"></script>
<script>
  document.currentScript.previousElementSibling.src += '?v=' + encodeURIComponent(APP_VERSION);
</script>

<script src="./app.js" defer></script>
<script>
  document.currentScript.previousElementSibling.src += '?v=' + encodeURIComponent(APP_VERSION);
</script>

</body>
</html>
