<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./favicon.ico">

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/theme-light.css" id="theme-light">
  <link rel="stylesheet" href="./css/theme-dark.css" id="theme-dark" disabled>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="./app.js" defer></script>
</head>

<body>

<h2>Health Tracker</h2>

<div class="row">
  <button id="btnRefresh">Refresh</button>
  <button id="btnFields">Select Fields</button>
  <button id="btnThresholds">Thresholds</button>
  <button id="btnAdd">Add Entry</button>
  <button id="btnOptions">Options</button>
</div>

<div class="row">
  <button id="btnSaveCSV">Save CSV</button>
  <button id="btnSavePDF">Save PDF</button>
  <button id="btnImportCSV">Import CSV</button>
  <button id="btnTheme">Light / Dark</button>
</div>

<canvas id="chart" height="120"></canvas>

<!-- MODALS -->
<div id="modalBackdrop" class="backdrop hidden"></div>

<div class="modal hidden" id="addModal">
<h3>Add Entry</h3>
<label>Date <input type="date" id="eDate"></label>
<label>Field <input id="eField"></label>
<label>Value <input type="number" id="eValue"></label>
<div class="actions">
  <button onclick="addEntry()">Save</button>
  <button onclick="closeModal()">Cancel</button>
</div>
</div>

<div class="modal hidden" id="fieldModal">
<h3>Select Fields</h3>
<div id="fieldList"></div>
<div class="actions">
  <button onclick="deleteFields()">Delete Selected</button>
  <button onclick="closeModal()">Close</button>
</div>
</div>

<div class="modal hidden" id="thresholdModal">
<h3>Thresholds</h3>
<label>Field <input id="tField"></label>
<label>Min <input type="number" id="tMin"></label>
<label>Max <input type="number" id="tMax"></label>
<button onclick="saveThreshold()">Save</button>
<hr>
<div id="thresholdList"></div>
<button onclick="closeModal()">Close</button>
</div>

<div class="modal hidden" id="optionsModal">
<h3>Options</h3>
<p>Application configuration options.</p>
<button onclick="closeModal()">Close</button>
</div>

<input type="file" id="csvFile" accept=".csv" hidden>

<script>
/* ===============================
   Theme handling
================================ */
const setTheme = theme => {
  document.documentElement.dataset.theme = theme;
  document.getElementById("theme-light").disabled = theme !== "light";
  document.getElementById("theme-dark").disabled = theme !== "dark";
  localStorage.setItem("theme", theme);
};

const storedTheme = localStorage.getItem("theme") || "light";
setTheme(storedTheme);

btnTheme.onclick = () =>
  setTheme(document.documentElement.dataset.theme === "light" ? "dark" : "light");

/* ===============================
   Service Worker (safe)
================================ */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service.js").catch(()=>{});
  });
}
</script>

</body>
</html>
