<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ================= META ================= -->
  <meta charset="utf-8" />
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="app-version" content="1.0.0" />

  <!-- ================= THEME BOOTSTRAP (NO FLASH) ================= -->
  <script>
    (() => {
      const saved = localStorage.getItem('HT_THEME');
      const prefersDark = window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      window.APP_THEME = theme;
    })();
  </script>

  <!-- ================= STYLES ================= -->
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/theme-dark.css">
  <link rel="stylesheet" href="./css/theme-light.css">
  <link rel="stylesheet" href="./range-slider.css">

  <!-- ================= PWA ================= -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- ================= LIBRARIES ================= -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>

  <!-- ================= APP SCRIPTS ================= -->
  <script src="./range-slider.js" defer></script>
  <script src="./app.js" defer></script>

  <!-- ================= VERSION / BUILD ================= -->
  <script>
    (() => {
      const version = document.querySelector('meta[name="app-version"]').content;
      const last = localStorage.getItem('HT_VERSION');
      const build = last === version
        ? Number(localStorage.getItem('HT_BUILD') || 0) + 1
        : 1;
      localStorage.setItem('HT_VERSION', version);
      localStorage.setItem('HT_BUILD', build);
      window.APP_VERSION = version;
      window.APP_BUILD = build;
    })();
  </script>
</head>

<body>

<header>
  <div class="wrap headbar">
    <div>
      <h1>Health Tracker</h1>
      <div class="small" id="appVersion"></div>
    </div>
    <div class="install">
      <button id="btnTheme" class="btn" title="Toggle light/dark">🌙</button>
      <button id="btnInstall" class="btn" style="display:none">Install</button>
      <button id="btnCheckUpdates" class="btn">Check for updates</button>
    </div>
  </div>
  
  <!-- ===== EXTRA ACTION BUTTONS (SAFE ADDITIVE) ===== -->
<div class="card toolbar" id="extraActions">
  <div class="row">
    <button class="btn" id="btnResetFilters">Reset Filters</button>
    <button class="btn" id="btnScrollTable">Go to Table</button>
    <button class="btn" id="btnScrollChart">Go to Chart</button>
    <button class="btn warn" id="btnReload">Reload App</button>
  </div>
</div>
  
</header>

<main class="wrap">
  <!-- your existing KPI / table markup stays unchanged -->

  <div class="card full-width" id="chartCard">
    <div class="section-title">
      <h2>Metrics Chart</h2>
      <button id="btnCollapseChart" class="btn">Collapse</button>
    </div>
    <div id="chartPanel" style="height:320px">
      <canvas id="metricsChart"></canvas>
    </div>
  </div>
</main>

<!-- ================= HELPER (SAFE, BLACK TEXT ONLY) ================= -->
<script>
(() => {
  const root = document.documentElement;

  window.addEventListener('load', () => {
    const el = document.getElementById('appVersion');
    if (el) el.textContent = `Version ${APP_VERSION} (build ${APP_BUILD})`;
  });

  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('btnTheme');
    btn.onclick = () => {
      const t = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', t);
      localStorage.setItem('HT_THEME', t);
      btn.textContent = t === 'dark' ? '☀️' : '🌙';
      patchChart();
    };
    btn.textContent = root.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
  });

  function patchChart() {
    const ch = window.Chart?.getChart?.('metricsChart');
    if (!ch) return;

    const text = '#000000';
    const grid = 'rgba(0,0,0,0.15)';

    ch.options.plugins.legend.labels.color = text;

    Object.values(ch.options.scales || {}).forEach(s => {
      s.ticks.color = text;
      s.title.color = text;
      s.grid.color = grid;
    });

    ch.update();
  }

  new MutationObserver(patchChart)
    .observe(root, { attributes: true, attributeFilter: ['data-theme'] });

})();
</script>

<script>
(() => {
  document.getElementById('btnResetFilters')?.addEventListener('click', () => {
    document.querySelectorAll('input[type="date"]').forEach(i => i.value = '');
  });

  document.getElementById('btnScrollTable')?.addEventListener('click', () => {
    document.querySelector('table')?.scrollIntoView({ behavior: 'smooth' });
  });

  document.getElementById('btnScrollChart')?.addEventListener('click', () => {
    document.getElementById('chartCard')?.scrollIntoView({ behavior: 'smooth' });
  });

  document.getElementById('btnReload')?.addEventListener('click', () => {
    location.reload();
  });
})();
</script>

</body>
</html>
