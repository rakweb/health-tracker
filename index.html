<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <!-- ================= META ================= -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1220">

  <!-- ✅ Single source of truth (GitHub injects real value) -->
  <meta name="app-version" content="dev">

  <title>Health Tracker</title>

  <!-- ================= THEME BOOTSTRAP (NO FOUC) ================= -->
  <script>
    (function () {
      const saved = localStorage.getItem('HT_THEME');
      const prefersDark = matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme =
        saved || (prefersDark ? 'dark' : 'light');
    })();
  </script>

  <!-- ================= STYLES ================= -->
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/theme-dark.css">
  <link rel="stylesheet" href="./css/theme-light.css">
  <link rel="stylesheet" href="./range-slider.css">

  <!-- ================= PWA ================= -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- ================= LIBRARIES ================= -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
  <div class="wrap headbar">
    <div>
      <h1>Health Tracker</h1>
      <div class="small" id="appVersion"></div>
    </div>

    <div class="install">
      <button id="btnTheme" class="btn" title="Toggle theme">🌙</button>
      <button id="btnInstall" class="btn" hidden>Install</button>
      <button id="btnCheckUpdates" class="btn">Check for updates</button>
    </div>
  </div>
</header>

<!-- ================= MAIN ================= -->
<main class="wrap">

  <!-- Your existing toolbar / KPIs / tables / charts remain unchanged -->

</main>

<!-- ================= APP SCRIPTS ================= -->
<script src="./range-slider.js"></script>
<script src="./app.js" defer></script>

<!-- ================= VERSION DISPLAY (READ‑ONLY) ================= -->
<script>
  window.addEventListener('load', () => {
    const meta = document.querySelector('meta[name="app-version"]');
    const el = document.getElementById('appVersion');
    if (meta && el) {
      el.textContent = `Version ${meta.content}`;
    }
  });
</script>

<!-- ================= THEME TOGGLE ================= -->
<script>
  (() => {
    const root = document.documentElement;
    const btn = document.getElementById('btnTheme');

    const sync = () => {
      btn.textContent = root.dataset.theme === 'dark' ? '☀️' : '🌙';
    };

    btn.addEventListener('click', () => {
      root.dataset.theme =
        root.dataset.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('HT_THEME', root.dataset.theme);
      sync();
    });

    sync();
  })();
</script>

</body>
</html>
