<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1220">
  <meta name="app-version" content="1.0.0">

  <!-- ===== Theme bootstrap (no flash) ===== -->
  <script>
    (() => {
      const saved = localStorage.getItem('HT_THEME');
      const prefersDark = matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = saved || (prefersDark ? 'dark' : 'light');
    })();
  </script>

  <!-- ===== Base CSS ===== -->
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/theme-dark.css">
  <link rel="stylesheet" href="./css/theme-light.css">
  <link rel="stylesheet" href="./range-slider.css">

  <!-- ===== Libraries ===== -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

<header>
  <div class="wrap headbar">
    <div>
      <h1>Health Tracker</h1>
      <div class="small" id="appVersion"></div>
    </div>

    <div class="toolbar">
      <button class="btn" data-action="ut type="date" id="filterStart"></div>
      <div><label>To</label><input type="date" id="filterEnd"></div>

      <div>
        <label>Chart Metrics</label>
        <select id="chartMetrics" multiple size="4"></select>
      </div>

      <div>
        <label>View</label>
        <select id="viewMode">
          <option value="both">Table + Chart</option>
          <option value="table">Table only</option>
          <option value="chart">Chart only</option>
        </select>
      </div>
    </div>

    <div class="row">
      <button classh</button>

  <!-- ===== TABLE (ALWAYS EXISTS) ===== -->

    <div class="section-title">
      <h2>Entries</h2>
      <span class="small">Editable · Filtered · Exportable</span>
    </div>

    <div style="overflow:auto">
      <table id="entriesTable">
        <thead id="tableHead">
          <tr><th>Date</th><th>Metric</th><th>Value</th><th></th></tr>
        </thead>
        <tbody id="tableBody">
          <!-- Populated by app.js -->
        </tbody>
      </table>
    </div>
  </section>

  <!-- ===== METRICS CHART ===== -->
  <section class="card full-width" id="chartCard">
    <div class="section-title">
      <h2>Metrics Chart</h2>
      <button class="btn" data-action=" </div>

    <div id="chartPanel" style="height:320px">
      <canvas id="metricsChart"></canvas>
    </div>
  </section>

</main>

<!-- ================= MODALS ================= -->

<!-- Add / Edit Entry -->
<div class="modal-backdrop" id="entryModal">

<!-- Options -->

    <header class="modal-header">
      <h2>Options</h2>
      <button class="btn" data-action="close-options<div class="row">
      <div><label>Theme</label><select id="optTheme"><option>dark</option><option>light</option></select></div>
      <div><label>Autosave</label><select id="optAutosave"><option>on</option><option>off</option></select></div>

<!-- ===== RANGE SLIDER ===== -->
