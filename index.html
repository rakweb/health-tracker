<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Tracker</title>
  <meta name="theme-color" content="#0b1220">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b1220'/%3E%3Cpath d='M10 42h12l6-18 9 27 6-15h8l4 8h10' fill='none' stroke='%234ba3ff' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="manifest" href="./manifest.webmanifest">

  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    /* Keep your existing CSS – no major changes needed */
  </style>
</head>
<body>

<!-- Your HTML structure remains mostly the same -->
<!-- Toolbar, KPIs, Chart+Table, Modals, Toast... -->

<script>
// === Constants & Config ===
const BUILD = { appVersion: '1.0', buildNumber: 'dev' };
const METRICS = [ /* your full METRICS array */ ];
const CORE_FIELDS = ['date','time', ...METRICS.map(m=>m.key)];
const DEFAULT_FIELDS_VISIBLE = ['date','time','glucose','sys','dia','spo2','hr','weightLbs','heightIn','waistIn','sleep','steps','pain','emotions','comments'];
const DEFAULT_THRESHOLDS = { /* your thresholds */ };
const OPTIONS = { autosave:'on', csvSelectedOnly:'yes', pdfIncludeChart:'yes' };

// === DB ===
const DB = {
  db: null,
  async open() {
    return new Promise((res, rej) => {
      if (!('indexedDB' in window)) return res();
      const req = indexedDB.open('health-tracker-db', 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('entries')) {
          db.createObjectStore('entries', {keyPath:'id', autoIncrement:true}).createIndex('by_date','date');
        }
        if (!db.objectStoreNames.contains('config')) db.createObjectStore('config', {keyPath:'key'});
      };
      req.onsuccess = () => { DB.db = req.result; res(); };
      req.onerror = () => rej(req.error);
    });
  },
  async putEntry(entry) {
    if (!DB.db) return;
    const tx = DB.db.transaction('entries','readwrite');
    const store = tx.objectStore('entries');
    await (entry.id != null ? store.put(entry) : store.add(entry));
  },
  async deleteEntry(id) {
    if (!DB.db) return;
    const tx = DB.db.transaction('entries','readwrite');
    await tx.objectStore('entries').delete(id);
  },
  async getAllEntries() {
    if (!DB.db) return [];
    const tx = DB.db.transaction('entries','readonly');
    return (await tx.objectStore('entries').getAll()) || [];
  },
  async putConfig(key, value) {
    if (!DB.db) return;
    const tx = DB.db.transaction('config','readwrite');
    await tx.objectStore('config').put({key, value});
  },
  async getConfig(key) {
    if (!DB.db) return null;
    const tx = DB.db.transaction('config','readonly');
    const res = await tx.objectStore('config').get(key);
    return res?.value ?? null;
  }
};

// === Utils ===
const U = {
  toISODate: d => d?.toISOString?.().slice(0,10),
  parseDateTime: (d,t) => d ? new Date(`${d}T${t||'00:00'}`) : null,
  fmt: (n,dp=0) => (n==null||isNaN(n)) ? '—' : Number(n).toFixed(dp),
  bmi: (w,h) => w&&h ? 703*(w/(h*h)) : null,
  whtr: (w,h) => w&&h ? w/h : null,
  csvEscape: v => {
    if (v==null) return '';
    const s = typeof v==='string' ? v : JSON.stringify(v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  },
  dateInRange: (ds,s,e) => {
    if (!ds) return false;
    const d = new Date(ds);
    return !(s && d<new Date(s)) && !(e && d>new Date(e));
  }
};

// === State ===
const State = {
  entries: [],
  fieldsVisible: new Set(DEFAULT_FIELDS_VISIBLE),
  thresholds: structuredClone(DEFAULT_THRESHOLDS),
  options: {...OPTIONS},
  ui: { chartEnabled: true },
  editId: null,
  medsBuffer: []
};

// === UI ===
const UI = {
  chart: null,

  initChartMetricSelector() {
    const s = document.getElementById('chartMetrics');
    s.innerHTML = '';
    METRICS.forEach(m => {
      if (m.type==='number' || m.key==='pain') {
        const o = document.createElement('option');
        o.value = m.key; o.text = m.label;
        if (['glucose','sys','dia','spo2','hr','weightLbs'].includes(m.key)) o.selected = true;
        s.appendChild(o);
      }
    });
  },

  buildTable() {
    const h = document.getElementById('tableHead'), b = document.getElementById('tableBody');
    h.innerHTML = b.innerHTML = '';
    const tr = document.createElement('tr');
    ['date','time',...State.fieldsVisible].forEach(k => {
      const m = METRICS.find(x=>x.key===k);
      const th = document.createElement('th');
      th.textContent = m?.label || (k==='date'?'Date':'Time');
      tr.appendChild(th);
    });
    tr.appendChild(Object.assign(document.createElement('th'),{textContent:'Actions'}));
    h.appendChild(tr);

    const start = document.getElementById('filterStart')?.value || '';
    const end = document.getElementById('filterEnd')?.value || '';

    State.entries
      .filter(e => U.dateInRange(e.date, start, end))
      .sort((a,b) => (U.parseDateTime(b.date,b.time)?.getTime()||0) - (U.parseDateTime(a.date,a.time)?.getTime()||0))
      .forEach(e => {
        const r = document.createElement('tr');
        ['date','time',...State.fieldsVisible].forEach(k => {
          const td = document.createElement('td');
          let v = e[k];
          if (k==='meds' && Array.isArray(v)) v = v.map(m=>`${m.name} ${m.dose||''}${m.units?' '+m.units:''}`).join('; ');
          td.textContent = v ?? '—';
          r.appendChild(td);
        });
        const td = document.createElement('td');
        td.innerHTML = `<button class="btn">Edit</button> <button class="btn danger">Delete</button>`;
        td.querySelector('.btn').onclick = () => UI.openEntry(e.id);
        td.querySelector('.btn.danger').onclick = async () => {
          if (confirm('Delete?')) { await Actions.deleteEntry(e.id); await Actions.refreshAll(); }
        };
        r.appendChild(td);
        b.appendChild(r);
      });
  },

  // ... keep your refreshKPIs, refreshRiskChips, refreshChart, openEntry, closeEntry, openFields, closeFields, openThresholds, closeThresholds, openOptions, closeOptions, renderMedsBuffer ...
};

// === Actions ===
const Actions = {
  async init() {
    await DB.open();
    State.fieldsVisible = new Set(await DB.getConfig('fieldsVisible') || DEFAULT_FIELDS_VISIBLE);
    State.thresholds = await DB.getConfig('thresholds') || structuredClone(DEFAULT_THRESHOLDS);
    State.options = await DB.getConfig('options') || {...OPTIONS};
    const ui = await DB.getConfig('ui');
    if (ui?.chartEnabled != null) State.ui.chartEnabled = ui.chartEnabled;

    document.getElementById('toggleChart').value = State.ui.chartEnabled ? 'on' : 'off';
    document.getElementById('chartCard').style.display = State.ui.chartEnabled ? '' : 'none';

    State.entries = await DB.getAllEntries();
    UI.initChartMetricSelector();
    UI.buildTable();
    UI.refreshKPIs();
    UI.refreshChart();
  },

  // keep saveEntryFromForm, deleteEntry, refreshAll, saveFields, saveThresholds, saveOptions, exportCSV, exportPDF (with improved filtering)
};

// === Event Listeners ===
function bindEvents() {
  document.querySelectorAll('.modal-backdrop').forEach(bd => {
    bd.addEventListener('click', e => {
      if (e.target === bd) bd.classList.remove('show');
    });
  });

  document.getElementById('btnAdd')?.onclick = () => UI.openEntry(null);
  document.getElementById('btnFields')?.onclick = () => UI.openFields();
  document.getElementById('btnThresholds')?.onclick = () => UI.openThresholds();
  document.getElementById('btnOptions')?.onclick = () => UI.openOptions();

  document.getElementById('btnSaveEntry')?.addEventListener('click', async e => {
    e.preventDefault(); e.stopPropagation();
    if (await Actions.saveEntryFromForm()) {
      UI.closeEntry();
      await Actions.refreshAll();
    }
  });

  document.getElementById('btnDeleteEntry')?.addEventListener('click', async e => {
    e.preventDefault(); e.stopPropagation();
    if (State.editId && confirm('Delete?')) {
      await Actions.deleteEntry(State.editId);
      UI.closeEntry();
      await Actions.refreshAll();
    }
  });

  // similar pattern for btnSaveFields, btnSaveThresholds, btnSaveOptions, btnAddMed, btnRefresh, btnSaveCSV, btnSavePDF ...

  document.getElementById('toggleChart')?.addEventListener('change', e => {
    State.ui.chartEnabled = e.target.value === 'on';
    document.getElementById('chartCard').style.display = State.ui.chartEnabled ? '' : 'none';
    if (!State.ui.chartEnabled && UI.chart) { UI.chart.destroy(); UI.chart = null; }
    DB.putConfig('ui', State.ui);
    UI.refreshChart();
  });
}

// Bootstrap
(async () => {
  try {
    await Actions.init();
    bindEvents();
  } catch (err) {
    console.error('Startup failed', err);
  }
})();
</script>
</body>
</html>
