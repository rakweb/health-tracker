<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Tracker</title>
  <meta name="theme-color" content="#0b1220">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b1220'/%3E%3Cpath d='M10 42h12l6-18 9 27 6-15h8l4 8h10' fill='none' stroke='%234ba3ff' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

  <link rel="manifest" href="data:application/manifest+json,{
    'name': 'Health Tracker',
    'short_name': 'HealthTrack',
    'start_url': '.',
    'display': 'standalone',
    'background_color': '#0b1220',
    'theme_color': '#0b1220',
    'icons': [{'src': 'data:image/svg+xml,%3Csvg...%3E', 'sizes': '192x192', 'type': 'image/svg+xml'}]
  }">

  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #0b1220; --panel: #121a2a; --muted: #8aa0c3; --text: #e6eefc;
      --accent: #4ba3ff; --danger: #ff5c5c; --ok: #27d79b; --warn: #ffcc66;
      --ring: #2a3a58; --chip: #1a2440; --btn: #1a2842; --btn-hover: #223152;
      --card: #0e1628;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header {
      position: sticky; top:0; z-index:10;
      background: rgba(11,18,32,0.9); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--ring); padding: 12px 16px;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
    h1 { font-size: 1.8rem; margin: 0.5rem 0; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 12px;
      background: var(--panel); padding: 16px; border-radius: 12px; margin: 16px 0;
    }
    button, input, select {
      padding: 9px 14px; border-radius: 8px; border: 1px solid #2a3a58;
      background: #0c1426; color: white;
    }
    button { cursor: pointer; }
    button.ok { background: #113c2d; border-color: #2f8f73; }
    button.danger { background: #3a1216; border-color: #8e2b37; }
    table { width:100%; border-collapse:collapse; margin:20px 0; background:var(--panel); border-radius:10px; }
    th, td { padding:12px; text-align:left; border-bottom:1px solid #1f2a45; }
    th { background:#0a1426; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .chip {
      padding: 6px 12px; border-radius: 999px; font-size: 0.9rem;
      border: 1px solid; display: inline-flex; align-items: center; gap: 6px;
    }
    .chip.ok { background: rgba(39,215,155,0.15); border-color: #27d79b; }
    .chip.warn { background: rgba(255,204,102,0.15); border-color: #ffcc66; }
    .chip.danger { background: rgba(255,92,92,0.15); border-color: #ff5c5c; }

    /* Modal + Animations */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
    }
    .modal-backdrop.show { display: flex; opacity: 1; }
    .modal {
      background: var(--card); border: 1px solid var(--ring); border-radius: 12px;
      width: 94%; max-width: 920px; max-height: 90vh; overflow-y: auto; padding: 20px;
      transform: scale(0.85); opacity: 0;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-backdrop.show .modal { transform: scale(1); opacity: 1; }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px 20px; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 5px; }
    input, select, textarea {
      width: 100%; padding: 10px; border-radius: 6px;
      border: 1px solid #2a3a58; background: #0c1426; color: white;
    }
    .field-full { grid-column: 1 / -1; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .chip {
      background: #1a2440; border: 1px solid #2a3a58; border-radius: 999px;
      padding: 5px 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
    }
    .chip button { background:none; border:none; color:#ff5c5c; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>Health Tracker</h1>
    <div class="sub">Track vitals, symptoms & notes</div>
    <button id="btnInstall" style="display:none; margin-top:8px;">Install App</button>
  </div>
</header>

<main class="wrap">
  <div class="toolbar">
    <button id="btnAdd" class="ok">+ Add Entry</button>
    <button id="btnRefresh">Refresh</button>
    <button id="btnExportCSV">Export CSV</button>
    <button id="btnExportPDF">Export PDF</button>
    <button id="btnImport">Import CSV</button>
    <input type="file" id="fileImport" accept=".csv" style="display:none">
  </div>

  <div id="riskChips" class="chips" style="margin:16px 0;"></div>

  <div style="height:300px; margin:20px 0;">
    <canvas id="healthChart"></canvas>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th><th>Time</th><th>Glucose</th><th>BP</th><th>SpO₂</th><th>HR</th><th>Weight</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</main>

<!-- Entry Modal -->
<div class="modal-backdrop" id="entryModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Entry</h2>
      <button type="button" class="close-modal">×</button>
    </div>

    <div class="row">
      <div><label>Date *</label><input type="date" id="f_date" required></div>
      <div><label>Time</label><input type="time" id="f_time"></div>
      <div><label>Glucose (mg/dL)</label><input type="number" id="f_glucose" step="any"></div>
      <div><label>Systolic</label><input type="number" id="f_sys"></div>
      <div><label>Diastolic</label><input type="number" id="f_dia"></div>
      <div><label>SpO₂ (%)</label><input type="number" id="f_spo2" min="0" max="100" step="0.1"></div>
      <div><label>Heart Rate</label><input type="number" id="f_hr"></div>
      <div><label>Weight (lbs)</label><input type="number" id="f_weightLbs" step="0.1"></div>
      <div><label>Height (in)</label><input type="number" id="f_heightIn" step="0.1"></div>
      <div><label>Waist (in)</label><input type="number" id="f_waistIn" step="0.1"></div>
      <div><label>Temp (°F)</label><input type="number" id="f_tempF" step="0.1"></div>
      <div><label>Lung Fluid (cc)</label><input type="number" id="f_lungFluidCc"></div>
      <div><label>Respiration</label><input type="number" id="f_resp"></div>
      <div><label>Sleep (hrs)</label><input type="number" id="f_sleep" step="0.1"></div>
      <div><label>Steps</label><input type="number" id="f_steps"></div>
      <div><label>Stress (0-100)</label><input type="number" id="f_stress" min="0" max="100"></div>
      <div><label>Body Battery</label><input type="number" id="f_bodyBattery" min="0" max="100"></div>

      <div>
        <label>Pain (0-10)</label>
        <input type="range" id="f_pain" min="0" max="10" value="0" step="1"
               oninput="document.getElementById('painVal').textContent=this.value">
        <div>Level: <strong id="painVal">0</strong></div>
      </div>

      <div><label>Emotions</label>
        <select id="f_emotions">
          <option value="">— None —</option>
          <option>Happy</option><option>Calm</option><option>Neutral</option>
          <option>Anxious</option><option>Stressed</option><option>Sad</option><option>Fatigued</option>
        </select>
      </div>

      <div class="field-full">
        <label>Medicines</label>
        <div style="display:flex; gap:8px;">
          <input id="medName" placeholder="Name">
          <input id="medDose" placeholder="Dose">
          <input id="medUnit" placeholder="Unit">
          <button type="button" id="btnAddMed">+ Add</button>
        </div>
        <div id="medList" class="chips"></div>
      </div>

      <div class="field-full">
        <label>Comments</label>
        <textarea id="f_comments" rows="4" placeholder="Notes..."></textarea>
      </div>
    </div>

    <div style="margin-top:24px; text-align:right;">
      <button class="danger" id="btnDeleteEntry" style="display:none; margin-right:12px;">Delete</button>
      <button class="ok" id="btnSaveEntry">Save Entry</button>
    </div>
  </div>
</div>


<script>
'use strict';

// ─────────────────────────────────────────────
// Build metadata
const BUILD = { appVersion: '1.0.0', buildNumber: 'dev', commit: '-', timestamp: '-' };

// ─────────────────────────────────────────────
// Install / A2HS
let deferredPrompt = null;
const installBtn = document.getElementById('btnInstall');
const installHint = document.getElementById('installHint');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn?.style.removeProperty('display');
  installHint.textContent = 'Click Install to add to your device.';
});

installBtn?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  installHint.textContent = outcome === 'accepted' ? 'Installing…' : 'Install dismissed.';
  setTimeout(() => installHint.textContent = '', 2500);
  deferredPrompt = null;
  installBtn.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
  installHint.textContent = 'Installed!';
  setTimeout(() => installHint.textContent = '', 2500);
});

// ─────────────────────────────────────────────
// Service Worker + version display
let swReg = null;

document.getElementById('appVersion').textContent = BUILD.appVersion;
document.getElementById('buildNumber').textContent = BUILD.buildNumber;

fetch('./version.json', { cache: 'no-store' })
  .then(r => r.ok ? r.json() : null)
  .then(v => {
    if (v) {
      BUILD.appVersion = v.version || BUILD.appVersion;
      BUILD.buildNumber = v.build || BUILD.buildNumber;
      document.getElementById('appVersion').textContent = BUILD.appVersion;
      document.getElementById('buildNumber').textContent = BUILD.buildNumber;
    }
  })
  .catch(() => {});

const checkBtn = document.getElementById('btnCheckUpdates');
const toast = document.getElementById('updateToast');

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      swReg = await navigator.serviceWorker.register('./sw.js');
      const askVersion = () => navigator.serviceWorker.controller?.postMessage({type:'GET_VERSION'});
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'VERSION' && e.data?.cache) {
          document.getElementById('swVersion').textContent = e.data.cache;
        }
      });
      if (swReg.active) askVersion(); else navigator.serviceWorker.ready.then(askVersion);

      swReg.addEventListener('updatefound', () => {
        const sw = swReg.installing;
        sw?.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            toast.classList.add('show');
          }
        });
      });
    } catch (e) {
      console.error('SW registration failed', e);
    }
  });

  navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
}

document.getElementById('btnReloadNow')?.addEventListener('click', () => {
  swReg?.waiting?.postMessage({type:'SKIP_WAITING'});
});

document.getElementById('btnDismissToast')?.addEventListener('click', () => {
  toast.classList.remove('show');
});

checkBtn?.addEventListener('click', async () => {
  installHint.textContent = 'Checking…';
  try {
    await swReg?.update();
    if (swReg?.waiting) toast.classList.add('show');
    else installHint.textContent = 'No updates found.';
  } catch (e) {
    installHint.textContent = 'Update check failed.';
  }
  setTimeout(() => installHint.textContent = '', 2200);
});

// ─────────────────────────────────────────────
// Register Chart.js annotation plugin (safe)
if (window.Chart && window['chartjs-plugin-annotation']) {
  Chart.register(window['chartjs-plugin-annotation']);
}

// ─────────────────────────────────────────────
// Data model, defaults, utils, state (unchanged except small fixes)
const METRICS = [ /* ... your METRICS array ... */ ]; // keep as-is

const CORE_FIELDS = ['date','time', ...METRICS.map(m=>m.key)];
const DEFAULT_FIELDS_VISIBLE = [ /* ... your list ... */ ];
const DEFAULT_THRESHOLDS = { /* ... your thresholds ... */ };
const OPTIONS = { autosave:'on', csvSelectedOnly:'yes', pdfIncludeChart:'yes' };

const DB = { /* ... your DB object ... keep as-is */ };
window.DB = DB;

const State = {
  entries: [],
  fieldsVisible: new Set(DEFAULT_FIELDS_VISIBLE),
  thresholds: JSON.parse(JSON.stringify(DEFAULT_THRESHOLDS)),
  options: {...OPTIONS},
  ui: { chartEnabled: true },
  editId: null,
  medsBuffer: [],
};

const U = { /* ... your utils ... keep as-is */ };

const UI = { /* ... keep most of your UI object ... */ };

UI.renderMedsBuffer = function() {
  const host = document.getElementById('medList');
  if (!host) return;
  host.innerHTML = '';
  State.medsBuffer.forEach((m, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${m.name} ${m.dose||''}${m.units ? ' ' + m.units : ''} `;
    const btn = document.createElement('button');
    btn.className = 'btn danger';
    btn.style.cssText = 'padding:2px 6px; margin-left:6px; font-size:11px;';
    btn.textContent = '×';
    btn.onclick = () => {
      State.medsBuffer.splice(i, 1);
      UI.renderMedsBuffer();
    };
    chip.appendChild(btn);
    host.appendChild(chip);
  });
};

// ─────────────────────────────────────────────
// Actions (keep most, but update saveThresholds & saveEntryFromForm slightly)

const Actions = {
  // ... keep init, putEntry, deleteEntry, getAllEntries, etc. ...

  async saveEntryFromForm() {
    const en = {
      date: document.getElementById('f_date')?.value || null,
      time: document.getElementById('f_time')?.value || null,
      glucose: num('f_glucose'),
      // ... all other fields using num() ...
      meds: [...State.medsBuffer],
      // ... emotions, comments ...
    };
    function num(id) {
      const v = document.getElementById(id)?.value?.trim();
      return v === '' ? null : Number(v);
    }

    if (!en.date) {
      alert('Date is required.');
      return;
    }

    if (State.editId != null) en.id = Number(State.editId);
    await DB.putEntry(en);
    State.editId = null;
  },

  async saveThresholds() {
    const merged = { ...State.thresholds };
    const keys = Object.keys(DEFAULT_THRESHOLDS);
    keys.forEach(k => {
      const wl = Number(document.getElementById(`t_${k}_warnLow`)?.value) || null;
      const bl = Number(document.getElementById(`t_${k}_bandLow`)?.value) || null;
      const bh = Number(document.getElementById(`t_${k}_bandHigh`)?.value) || null;
      const wh = Number(document.getElementById(`t_${k}_warnHigh`)?.value) || null;

      if ([wl,bl,bh,wh].some(v => v !== null)) {
        merged[k] = {
          warnLow:   wl ?? merged[k]?.warnLow ?? '',
          bandLow:   bl ?? merged[k]?.bandLow ?? '',
          bandHigh:  bh ?? merged[k]?.bandHigh ?? '',
          warnHigh:  wh ?? merged[k]?.warnHigh ?? ''
        };
      }
    });
    State.thresholds = merged;
    await DB.putConfig('thresholds', merged);
    UI.closeThresholds?.();
    UI.refreshKPIs();
    UI.refreshChart();
  },

  // ... keep exportCSV, exportPDF, refreshAll, saveFields, saveOptions ...
};

// ─────────────────────────────────────────────
// Event Listeners — FIXED VERSION

// Modal open buttons
document.getElementById('btnAdd')?.addEventListener('click', () => UI.openEntry(null));
document.getElementById('btnFields')?.addEventListener('click', () => UI.openFields());
document.getElementById('btnThresholds')?.addEventListener('click', () => UI.openThresholds());
document.getElementById('btnOptions')?.addEventListener('click', () => UI.openOptions());

// Modal SAVE / DELETE buttons
document.getElementById('btnSaveEntry')?.addEventListener('click', async (e) => {
  e.preventDefault();
  e.stopPropagation();
  await Actions.saveEntryFromForm();
  UI.closeEntry();
  await Actions.refreshAll();
});

document.getElementById('btnDeleteEntry')?.addEventListener('click', async (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (!State.editId || !confirm('Delete this entry?')) return;
  await Actions.deleteEntry(State.editId);
  UI.closeEntry();
  await Actions.refreshAll();
});

document.getElementById('btnSaveFields')?.addEventListener('click', async (e) => {
  e.preventDefault(); e.stopPropagation();
  await Actions.saveFields();
});

document.getElementById('btnSaveThresholds')?.addEventListener('click', async (e) => {
  e.preventDefault(); e.stopPropagation();
  await Actions.saveThresholds();
});

document.getElementById('btnSaveOptions')?.addEventListener('click', async (e) => {
  e.preventDefault(); e.stopPropagation();
  await Actions.saveOptions();
});

// Medicine add
document.getElementById('btnAddMed')?.addEventListener('click', (e) => {
  e.preventDefault();
  e.stopPropagation();
  const nameEl  = document.getElementById('med_name');
  const doseEl  = document.getElementById('med_dose');
  const unitsEl = document.getElementById('med_units');

  const name = nameEl?.value?.trim();
  if (!name) return;

  State.medsBuffer.push({
    name,
    dose: doseEl?.value?.trim() || null,
    units: unitsEl?.value?.trim() || null
  });

  nameEl.value = '';
  doseEl.value = '';
  unitsEl.value = '';

  UI.renderMedsBuffer();
});

// Other controls
document.getElementById('btnRefresh')?.addEventListener('click', () => {
  UI.buildTable();
  UI.refreshKPIs();
  UI.refreshChart();
});

document.getElementById('btnSaveCSV')?.addEventListener('click', () => Actions.exportCSV());
document.getElementById('btnSavePDF')?.addEventListener('click', () => Actions.exportPDF());

// Chart & filter changes
['chartMetrics','axisMode','toggleChart','filterStart','filterEnd'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', () => {
    if (id === 'toggleChart') {
      State.ui.chartEnabled = document.getElementById('toggleChart').value === 'on';
      document.getElementById('chartCard').style.display = State.ui.chartEnabled ? '' : 'none';
      if (!State.ui.chartEnabled && UI.chart) {
        UI.chart.destroy();
        UI.chart = null;
      }
      DB.putConfig('ui', State.ui);
    }
    UI.refreshChart();
    if (id.startsWith('filter')) {
      UI.buildTable();
    }
  });
});

// Backdrop click-to-close — only when clicking the backdrop itself
['entryModal','fieldsModal','thModal','optModal'].forEach(id => {
  const backdrop = document.getElementById(id);
  backdrop?.addEventListener('click', e => {
    if (e.target === backdrop) {
      backdrop.classList.remove('show');
    }
  });
});

// ─────────────────────────────────────────────
// Safe init
(async () => {
  try {
    await Actions.init();
  } catch (err) {
    console.error('App initialization failed:', err);
  }
})();
</script>
  
  
</body>
</html>
