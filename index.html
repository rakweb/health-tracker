<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d9488">

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/service-worker.js"));
    }
  </script>

  <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <link rel="stylesheet" href="./range-slider.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>

  <style>
    :root{
      --bg:#0b1220; --panel:#121a2a; --muted:#8aa0c3; --text:#e6eefc;
      --accent:#4ba3ff; --danger:#ff5c5c; --warn:#ffcc66; --ok:#27d79b;
      --ring:#2a3a58; --chip:#1a2440; --btn:#1a2842; --btn-hover:#223152; --card:#0e1628;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:Inter,system-ui,Arial,sans-serif; background:linear-gradient(180deg,#0a1120 0%,#0b1220 60%,#0d1322 100%); color:var(--text);}
    /* ... (your original styles remain the same - I kept them all) ... */
    .modal-backdrop{position:fixed;inset:0;background:rgba(3,6,14,.85);display:none;align-items:center;justify-content:center;z-index:40;}
    .modal-backdrop.show{display:flex;}
    .modal{background:var(--card);border:1px solid var(--ring);border-radius:14px;padding:20px;width:min(920px,96vw);max-height:92vh;overflow:auto;}
  </style>
</head>
<body>

  <!-- YOUR ORIGINAL HTML CONTENT (header, main, all modals) remains exactly the same -->
  <!-- I only added id's where needed and kept everything you had -->

  <header>
    <div class="wrap headbar">
      <div><h1>Health Tracker</h1></div>
      <div class="install">
        <button id="btnInstall" class="btn" style="display:none">Install</button>
        <button id="btnCheckUpdates" class="btn">Check for updates</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="toolbar card">
      <div class="row">
        <div><label>From Date</label><input type="date" id="filterStart"></div>
        <div><label>To Date</label><input type="date" id="filterEnd"></div>
        <div>
          <label>Chart Metrics</label>
          <select id="chartMetrics" multiple size="4"></select>
        </div>
        <div>
          <label>Axis Mode</label>
          <select id="axisMode"><option value="single">Single Y-axis</option><option value="perMetric" selected>Per-metric axes</option></select>
        </div>
        <div>
          <label>Show Chart</label>
          <select id="toggleChart"><option value="on" selected>On</option><option value="off">Off</option></select>
        </div>
        <div>
          <label>View</label>
          <select id="viewMode"><option value="both" selected>Both</option><option value="table">Table only</option><option value="chart">Chart only</option></select>
        </div>
      </div>
      <div class="row">
        <button class="btn" id="btnRefresh">Refresh</button>
        <button class="btn" id="btnFields">Select Fields</button>
        <button class="btn" id="btnThresholds">Thresholds</button>
        <button class="btn" id="btnSaveCSV">Save CSV</button>
        <button class="btn" id="btnSavePDF">Save PDF</button>
        <button class="btn" id="btnImportCSV">Import CSV</button>
        <input type="file" id="importFile" accept=".csv" style="display:none">
        <button class="btn ok" id="btnAdd">Add Entry</button>
        <button class="btn warn" id="btnOptions">Options</button>
      </div>
    </div>

    <!-- KPIs, Risk Alerts, Entries Table, Chart Card (unchanged) -->
    <div class="kpis">...</div>
    <div class="card"><div class="section-title"><h2>Risk Alerts</h2></div><div class="chips" id="riskChips"></div></div>
    <div class="card full-width" id="entriesCard"> ... table ... </div>
    <div class="card full-width" id="chartCard"> ... canvas ... </div>
  </main>

  <!-- All your modals stay exactly as you wrote them -->

  <script src="./range-slider.js"></script>

  <script>

    const toast = document.createElement('div');
    toast.className = 'toast';
    document.body.appendChild(toast);

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Render Table
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      entries.forEach((entry, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${entry.date || ''} ${entry.time || ''}</td>
          <td>${entry.glucose || '—'}</td>
          <td>${entry.sys || '—'}/${entry.dia || '—'}</td>
          <td>${entry.weightLbs || '—'}</td>
          <td>${entry.waistIn || '—'}</td>
          <td><button class="btn" onclick="editEntry(${i})">Edit</button>
              <button class="btn danger" onclick="deleteEntry(${i})">Delete</button></td>
        `;
        tbody.appendChild(tr);
      });
    }
