<!-- ================= UNIFIED UI LOGIC (single source of truth) ================= -->
<script>
(() => {
  const root = document.documentElement;

  /* ---------------- Version display ---------------- */
  window.addEventListener('load', () => {
    const el = document.getElementById('appVersion');
    if (el) el.textContent = `Version ${window.APP_VERSION} (build ${window.APP_BUILD})`;
  });

  /* ---------------- Theme toggle button ---------------- */
  function setTheme(t) {
    root.dataset.theme = t;
    localStorage.setItem('HT_THEME', t);
    const btn = document.getElementById('btnTheme');
    if (btn) btn.textContent = (t === 'dark') ? '☀️' : '🌙';
    applyChartThemeAndPalette(); // re-apply chart text/colors after theme switch
  }

  window.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('btnTheme');
    if (!btn) return;
    // set icon for current theme
    btn.textContent = (root.dataset.theme === 'dark') ? '☀️' : '🌙';

    btn.addEventListener('click', () => {
      const next = (root.dataset.theme === 'dark') ? 'light' : 'dark';
      setTheme(next);
    });
  });

  /* ---------------- PDF export always LIGHT (HTML-only hook) ---------------- */
  window.addEventListener('load', () => {
    const btn = document.getElementById('btnSavePDF');
    if (!btn) return;

    btn.addEventListener('click', () => {
      root.setAttribute('data-pdf-export', '1');
      applyChartThemeAndPalette();

      setTimeout(() => {
        root.removeAttribute('data-pdf-export');
        applyChartThemeAndPalette();
      }, 2500); // adjust if PDF takes longer
    }, true); // capture phase so it happens before app.js PDF handler
  });

  /* ---------------- Chart legend/axes text + per-metric palette ---------------- */
  const PALETTE = ['#2563eb','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f472b6','#22c55e'];
  const METRIC_COLORS = {
    'Glucose (mg/dL)': '#2563eb',
    'Weight (lbs)': '#10b981',
    'Systolic (mmHg)': '#ef4444',
    'Diastolic (mmHg)': '#f59e0b',
    'SpO₂ (%)': '#8b5cf6',
    'Heart Rate (bpm)': '#06b6d4',
    'Temperature (°F)': '#f472b6'
  };

  function wantLightChart() {
    return root.dataset.theme === 'light' || root.getAttribute('data-pdf-export') === '1';
  }

  function applyChartThemeAndPalette() {
    const ch = window.Chart?.getChart?.('metricsChart');
    if (!ch) return;

    const light = wantLightChart();
    const text = light ? '#0a1220' : '#e6eefc';
    const grid = light ? 'rgba(10,18,32,0.14)' : 'rgba(230,238,252,0.14)';

    // Legend text
    ch.options.plugins = ch.options.plugins || {};
    ch.options.plugins.legend = ch.options.plugins.legend || {};
    ch.options.plugins.legend.labels = ch.options.plugins.legend.labels || {};
    ch.options.plugins.legend.labels.color = text;

    // Scales text
    if (ch.options.scales) {
      for (const key of Object.keys(ch.options.scales)) {
        const s = ch.options.scales[key];
        if (!s) continue;
        s.ticks = s.ticks || {};
        s.title = s.title || {};
        s.grid  = s.grid  || {};
        s.ticks.color = text;
        s.title.color = text;
        s.grid.color  = grid;
      }
    }

    // Dataset palette (stable per label)
    let i = 0;
    for (const ds of (ch.data.datasets || [])) {
      const label = String(ds.label || '');
      const c = METRIC_COLORS[label] || PALETTE[i++ % PALETTE.length];

      ds.borderColor = c;
      ds.backgroundColor = c;
      ds.pointBackgroundColor = c;
      ds.pointBorderColor = c;

      ds.borderWidth = ds.borderWidth ?? 2;
      ds.pointRadius = ds.pointRadius ?? 2;
      ds.tension = ds.tension ?? 0.25;
    }

    ch.update();
  }

  // Apply after chart exists (app.js creates it)
  window.addEventListener('load', () => {
    let tries = 0;
    const timer = setInterval(() => {
      if (window.Chart?.getChart?.('metricsChart')) {
        clearInterval(timer);
        applyChartThemeAndPalette();
      }
      if (++tries > 200) clearInterval(timer);
    }, 100);
  });

  // Re-apply when theme / pdf-export attribute changes
  new MutationObserver(() => applyChartThemeAndPalette())
    .observe(root, { attributes: true, attributeFilter: ['data-theme', 'data-pdf-export'] });

})();
</script>
