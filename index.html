  <!-- ================= SAFE AUTO VERSIONING ================= -->
  <script>
    /*
      Non-invasive auto versioning.
      Does NOT touch app logic or execution order.
    */
    (function () {
      const stored = localStorage.getItem('APP_VERSION');
      const version = stored || new Date().toISOString().slice(0, 19).replace('T', '_');
      localStorage.setItem('APP_VERSION', version);

      window.APP_VERSION = version;
      window.VERSION_PARAM = 'v=' + encodeURIComponent(version);
    })();
  </script>
