<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="app-version" content="1.0.0" />

  <!-- ===== Theme bootstrap (no flash) ===== -->
  <script>
    (function () {
      const saved = localStorage.getItem('HT_THEME');
      const prefersDark =
        window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- ===== CSS ===== -->
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/theme-dark.css" />
  <link rel="stylesheet" href="./css/theme-light.css" />
  <link rel="stylesheet" href="./range-slider.css" />

  <!-- ===== PWA ===== -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <!-- ===== Libraries ===== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>

  <!-- ===== Version + build ===== -->
  <script>
    (function () {
      const v = document.querySelector('meta[name="app-version"]').content;
      const last = localStorage.getItem('HT_VERSION');
      const build = last === v ? (Number(localStorage.getItem('HT_BUILD') || 0) + 1) : 1;
      localStorage.setItem('HT_VERSION', v);
      localStorage.setItem('HT_BUILD', build);
      window.APP_VERSION = v;
      window.APP_BUILD = build;
    })();
  </script>
</head>

<body>

<header>
  <div class="wrap headbar">
    <div>
      <h1>Health Tracker</h1>
      <div class="small" id="appVersion"></div>
    </div>
    <div class="install">
      <button id="btnTheme" class="btn" type="button">🌙</button>
      <button id="btnCheckUpdates" class="btn" type="button">Check for updates</button>
    </div>
  </div>
</header>

<main class="wrap">

  <!-- ================= TOOLBAR ================= -->
  <div class="toolbar card">
    <div class="row">
      <button class="btn" id="btnFields" type="button">Select Fields</button>
      <button class="btn" id="btnThresholds" type="button">Thresholds</button>
      <button class="btn ok" id="btnAdd" type="button">Add Entry</button>
      <button class="btn warn" id="btnOptions" type="button">Options</button>
    </div>
  </div>

  <!-- ================= ENTRIES TABLE (CREATED IN HTML) ================= -->
  <div class="card full-width">
    <div class="section-title">
      <h2>Entries</h2>
    </div>

    <div style="overflow:auto;">
      <table id="entriesTable">
        <thead id="tableHead">
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Metric</th>
            <th>Value</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="5" class="small">No entries yet</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- ================= MODALS ================= -->

<div class="modal-backdrop" id="entryModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Entry</h2>
      <button class="btn" data-close="entryModal">Close</button>
    </div>
    <div class="small">Entry form will be provided by app.js</div>
  </div>
</div>

<div class="modal-backdrop" id="fieldsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Select Fields</h2>
      <button class="btn" data-close="fieldsModal">Close</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="thModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Thresholds</h2>
      <button class="btn" data-close="thModal">Close</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="optModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Options</h2>
      <button class="btn" data-close="optModal">Close</button>
    </div>
  </div>
</div>

<!-- ===== App script (will be fixed later) ===== -->
<script src="./app.js" defer></script>

<!-- =====================================================
     UI SHIM — enables UI BEFORE app.js is fixed
     ===================================================== -->
<script>
(function () {
  function show(id) {
    document.getElementById(id)?.classList.add('show');
  }
  function hide(id) {
    document.getElementById(id)?.classList.remove('show');
  }

  window.addEventListener('load', () => {
    // Version label
    const v = document.getElementById('appVersion');
    if (v) v.textContent = `Version ${APP_VERSION} (build ${APP_BUILD})`;

    // Theme toggle
    document.getElementById('btnTheme')?.addEventListener('click', () => {
      const root = document.documentElement;
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('HT_THEME', next);
    });

    // Button wiring (independent of app.js)
    document.getElementById('btnFields')?.addEventListener('click', () => show('fieldsModal'));
    document.getElementById('btnThresholds')?.addEventListener('click', () => show('thModal'));
    document.getElementById('btnAdd')?.addEventListener('click', () => show('entryModal'));
    document.getElementById('btnOptions')?.addEventListener('click', () => show('optModal'));

    // Close buttons
    document.querySelectorAll('[data-close]').forEach(btn => {
      btn.addEventListener('click', () => hide(btn.getAttribute('data-close')));
    });
  });
})();
</script>

</body>
</html>
