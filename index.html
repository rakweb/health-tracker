<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Tracker</title>
  <meta name="theme-color" content="#0b1220">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b1220'/%3E%3Cpath d='M10 42h12l6-18 9 27 6-15h8l4 8h10' fill='none' stroke='%234ba3ff' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

  <link rel="manifest" href="data:application/manifest+json,{
    'name': 'Health Tracker',
    'short_name': 'HealthTrack',
    'start_url': '.',
    'display': 'standalone',
    'background_color': '#0b1220',
    'theme_color': '#0b1220',
    'icons': [{'src': 'data:image/svg+xml,%3Csvg...%3E', 'sizes': '192x192', 'type': 'image/svg+xml'}]
  }">

  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #0b1220; --panel: #121a2a; --muted: #8aa0c3; --text: #e6eefc;
      --accent: #4ba3ff; --danger: #ff5c5c; --ok: #27d79b; --warn: #ffcc66;
      --ring: #2a3a58; --chip: #1a2440; --btn: #1a2842; --btn-hover: #223152;
      --card: #0e1628;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header {
      position: sticky; top:0; z-index:10;
      background: rgba(11,18,32,0.9); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--ring); padding: 12px 16px;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
    h1 { font-size: 1.8rem; margin: 0.5rem 0; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 12px;
      background: var(--panel); padding: 16px; border-radius: 12px; margin: 16px 0;
    }
    button, input, select {
      padding: 9px 14px; border-radius: 8px; border: 1px solid #2a3a58;
      background: #0c1426; color: white;
    }
    button { cursor: pointer; }
    button.ok { background: #113c2d; border-color: #2f8f73; }
    button.danger { background: #3a1216; border-color: #8e2b37; }
    table { width:100%; border-collapse:collapse; margin:20px 0; background:var(--panel); border-radius:10px; }
    th, td { padding:12px; text-align:left; border-bottom:1px solid #1f2a45; }
    th { background:#0a1426; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .chip {
      padding: 6px 12px; border-radius: 999px; font-size: 0.9rem;
      border: 1px solid; display: inline-flex; align-items: center; gap: 6px;
    }
    .chip.ok { background: rgba(39,215,155,0.15); border-color: #27d79b; }
    .chip.warn { background: rgba(255,204,102,0.15); border-color: #ffcc66; }
    .chip.danger { background: rgba(255,92,92,0.15); border-color: #ff5c5c; }

    /* Modal + Animations */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
    }
    .modal-backdrop.show { display: flex; opacity: 1; }
    .modal {
      background: var(--card); border: 1px solid var(--ring); border-radius: 12px;
      width: 94%; max-width: 920px; max-height: 90vh; overflow-y: auto; padding: 20px;
      transform: scale(0.85); opacity: 0;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-backdrop.show .modal { transform: scale(1); opacity: 1; }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px 20px; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 5px; }
    input, select, textarea {
      width: 100%; padding: 10px; border-radius: 6px;
      border: 1px solid #2a3a58; background: #0c1426; color: white;
    }
    .field-full { grid-column: 1 / -1; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .chip {
      background: #1a2440; border: 1px solid #2a3a58; border-radius: 999px;
      padding: 5px 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
    }
    .chip button { background:none; border:none; color:#ff5c5c; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>Health Tracker</h1>
    <div class="sub">Track vitals, symptoms & notes</div>
    <button id="btnInstall" style="display:none; margin-top:8px;">Install App</button>
  </div>
</header>

<main class="wrap">
  <div class="toolbar">
    <button id="btnAdd" class="ok">+ Add Entry</button>
    <button id="btnRefresh">Refresh</button>
    <button id="btnExportCSV">Export CSV</button>
    <button id="btnExportPDF">Export PDF</button>
    <button id="btnImport">Import CSV</button>
    <input type="file" id="fileImport" accept=".csv" style="display:none">
  </div>

  <div id="riskChips" class="chips" style="margin:16px 0;"></div>

  <div style="height:300px; margin:20px 0;">
    <canvas id="healthChart"></canvas>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th><th>Time</th><th>Glucose</th><th>BP</th><th>SpO₂</th><th>HR</th><th>Weight</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</main>

<!-- Entry Modal -->
<div class="modal-backdrop" id="entryModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Entry</h2>
      <button type="button" class="close-modal">×</button>
    </div>

    <div class="row">
      <div><label>Date *</label><input type="date" id="f_date" required></div>
      <div><label>Time</label><input type="time" id="f_time"></div>
      <div><label>Glucose (mg/dL)</label><input type="number" id="f_glucose" step="any"></div>
      <div><label>Systolic</label><input type="number" id="f_sys"></div>
      <div><label>Diastolic</label><input type="number" id="f_dia"></div>
      <div><label>SpO₂ (%)</label><input type="number" id="f_spo2" min="0" max="100" step="0.1"></div>
      <div><label>Heart Rate</label><input type="number" id="f_hr"></div>
      <div><label>Weight (lbs)</label><input type="number" id="f_weightLbs" step="0.1"></div>
      <div><label>Height (in)</label><input type="number" id="f_heightIn" step="0.1"></div>
      <div><label>Waist (in)</label><input type="number" id="f_waistIn" step="0.1"></div>
      <div><label>Temp (°F)</label><input type="number" id="f_tempF" step="0.1"></div>
      <div><label>Lung Fluid (cc)</label><input type="number" id="f_lungFluidCc"></div>
      <div><label>Respiration</label><input type="number" id="f_resp"></div>
      <div><label>Sleep (hrs)</label><input type="number" id="f_sleep" step="0.1"></div>
      <div><label>Steps</label><input type="number" id="f_steps"></div>
      <div><label>Stress (0-100)</label><input type="number" id="f_stress" min="0" max="100"></div>
      <div><label>Body Battery</label><input type="number" id="f_bodyBattery" min="0" max="100"></div>

      <div>
        <label>Pain (0-10)</label>
        <input type="range" id="f_pain" min="0" max="10" value="0" step="1"
               oninput="document.getElementById('painVal').textContent=this.value">
        <div>Level: <strong id="painVal">0</strong></div>
      </div>

      <div><label>Emotions</label>
        <select id="f_emotions">
          <option value="">— None —</option>
          <option>Happy</option><option>Calm</option><option>Neutral</option>
          <option>Anxious</option><option>Stressed</option><option>Sad</option><option>Fatigued</option>
        </select>
      </div>

      <div class="field-full">
        <label>Medicines</label>
        <div style="display:flex; gap:8px;">
          <input id="medName" placeholder="Name">
          <input id="medDose" placeholder="Dose">
          <input id="medUnit" placeholder="Unit">
          <button type="button" id="btnAddMed">+ Add</button>
        </div>
        <div id="medList" class="chips"></div>
      </div>

      <div class="field-full">
        <label>Comments</label>
        <textarea id="f_comments" rows="4" placeholder="Notes..."></textarea>
      </div>
    </div>

    <div style="margin-top:24px; text-align:right;">
      <button class="danger" id="btnDeleteEntry" style="display:none; margin-right:12px;">Delete</button>
      <button class="ok" id="btnSaveEntry">Save Entry</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Database with error handling
// ─────────────────────────────────────────────

let db;
const DB_NAME = 'healthTracker';
const STORE = 'entries';

async function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(); };
    req.onerror = e => {
      console.error('IndexedDB open failed:', e.target.error);
      reject(e.target.error);
    };
  });
}

async function saveEntry(entry) {
  if (!db) {
    try {
      await initDB();
    } catch (err) {
      throw new Error('Database initialization failed: ' + err.message);
    }
  }

  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    let req;

    // Clean entry: remove id for new entries so autoIncrement works
    const { id, ...cleanEntry } = entry;
    if (id != null && Number.isInteger(id)) {
      req = store.put({ ...cleanEntry, id });
    } else {
      req = store.add(cleanEntry);
    }

    req.onsuccess = () => {
      console.log('Entry saved successfully');
      resolve();
    };
    req.onerror = () => {
      const err = req.error || new Error('Unknown IndexedDB error');
      console.error('Save failed:', err);
      reject(err);
    };
  });
}

async function getAllEntries() {
  if (!db) await initDB().catch(() => []);
  return new Promise(r => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => r(req.result || []);
    req.onerror = () => r([]);
  });
}

async function deleteEntry(id) {
  if (!db) await initDB().catch(() => {});
  return new Promise(r => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id).onsuccess = () => r();
  });
}

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────

let editId = null;
let meds = [];

// ─────────────────────────────────────────────
// Render table
// ─────────────────────────────────────────────

async function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  try {
    const entries = await getAllEntries();
    entries.sort((a,b) => (b.id||0) - (a.id||0));

    entries.forEach(e => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${e.date||'—'}</td>
        <td>${e.time||'—'}</td>
        <td>${e.glucose??'—'}</td>
        <td>${e.sys&&e.dia ? e.sys+'/'+e.dia : '—'}</td>
        <td>${e.spo2??'—'}</td>
        <td>${e.hr??'—'}</td>
        <td>${e.weightLbs??'—'}</td>
        <td><button class="edit">Edit</button> <button class="delete">Delete</button></td>
      `;
      tr.querySelector('.edit').onclick = () => openEntry(e.id, e);
      tr.querySelector('.delete').onclick = async () => {
        if (confirm('Delete entry?')) {
          try {
            await deleteEntry(e.id);
            renderTable();
          } catch (err) {
            alert('Delete failed: ' + err.message);
          }
        }
      };
      tbody.appendChild(tr);
    });
  } catch (err) {
    console.error('Table render failed:', err);
    tbody.innerHTML = '<tr><td colspan="8">Error loading data</td></tr>';
  }
}

// ─────────────────────────────────────────────
// Modal with animations
// ─────────────────────────────────────────────

function openEntry(id = null, data = {}) {
  editId = id;
  meds = data.meds ? [...data.meds] : [];

  document.getElementById('modalTitle').textContent = id ? 'Edit Entry' : 'Add Entry';
  document.getElementById('btnDeleteEntry').style.display = id ? '' : 'none';

  const fields = ['date','time','glucose','sys','dia','spo2','hr','weightLbs','heightIn','waistIn','tempF','lungFluidCc','resp','sleep','steps','stress','bodyBattery','pain','emotions','comments'];
  fields.forEach(f => {
    const el = document.getElementById('f_' + f);
    if (el) el.value = data[f] ?? (f==='pain' ? 0 : '');
  });

  document.getElementById('painVal').textContent = data.pain ?? 0;
  document.getElementById('f_pain').value = data.pain ?? 0;

  renderMeds();

  const backdrop = document.getElementById('entryModal');
  backdrop.classList.add('show');
}

function renderMeds() {
  const container = document.getElementById('medList');
  container.innerHTML = '';
  meds.forEach((m,i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${m.name} ${m.dose||''}${m.unit?' '+m.unit:''} <button>×</button>`;
    chip.lastChild.onclick = () => { meds.splice(i,1); renderMeds(); };
    container.appendChild(chip);
  });
}

function closeModal() {
  const backdrop = document.getElementById('entryModal');
  const modal = backdrop.querySelector('.modal');
  modal.style.transform = 'scale(0.85)';
  modal.style.opacity = '0';
  setTimeout(() => {
    backdrop.classList.remove('show');
    modal.style.transform = '';
    modal.style.opacity = '';
  }, 350);
}

// ─────────────────────────────────────────────
// Save with full error handling
// ─────────────────────────────────────────────

document.getElementById('btnSaveEntry').addEventListener('click', async e => {
  e.preventDefault();
  e.stopPropagation();

  const entry = {
    date: document.getElementById('f_date').value,
    time: document.getElementById('f_time').value || null,
    glucose: Number(document.getElementById('f_glucose').value) || null,
    sys: Number(document.getElementById('f_sys').value) || null,
    dia: Number(document.getElementById('f_dia').value) || null,
    spo2: Number(document.getElementById('f_spo2').value) || null,
    hr: Number(document.getElementById('f_hr').value) || null,
    weightLbs: Number(document.getElementById('f_weightLbs').value) || null,
    heightIn: Number(document.getElementById('f_heightIn').value) || null,
    waistIn: Number(document.getElementById('f_waistIn').value) || null,
    tempF: Number(document.getElementById('f_tempF').value) || null,
    lungFluidCc: Number(document.getElementById('f_lungFluidCc').value) || null,
    resp: Number(document.getElementById('f_resp').value) || null,
    sleep: Number(document.getElementById('f_sleep').value) || null,
    steps: Number(document.getElementById('f_steps').value) || null,
    stress: Number(document.getElementById('f_stress').value) || null,
    bodyBattery: Number(document.getElementById('f_bodyBattery').value) || null,
    pain: Number(document.getElementById('f_pain').value) || 0,
    emotions: document.getElementById('f_emotions').value || '',
    comments: document.getElementById('f_comments').value || '',
    meds: [...meds]
  };

  if (!entry.date) {
    alert('Date is required');
    return;
  }

  // Only include id for edits
  if (editId !== null && Number.isInteger(editId)) {
    entry.id = editId;
  }

  try {
    await saveEntry(entry);
    console.log('Saved:', entry);
    closeModal();
    renderTable();
    if ("Notification" in window && Notification.permission === "granted") {
      new Notification("Health Tracker", { body: "Entry saved successfully" });
    } else {
      alert("Entry saved");
    }
  } catch (err) {
    console.error('Save failed:', err);
    alert('Failed to save entry:\n' + (err.name + ': ' + err.message || 'Unknown error'));
  }
});

// ─────────────────────────────────────────────
// Refresh
// ─────────────────────────────────────────────

document.getElementById('btnRefresh').addEventListener('click', renderTable);

// ─────────────────────────────────────────────
// Export CSV
// ─────────────────────────────────────────────

document.getElementById('btnExportCSV').addEventListener('click', async () => {
  try {
    const entries = await getAllEntries();
    if (!entries.length) return alert('No data to export');

    const lines = ['date,time,glucose,sys,dia,spo2,hr,weightLbs,heightIn,waistIn,tempF,lungFluidCc,resp,sleep,steps,stress,bodyBattery,pain,emotions,comments,meds'];
    entries.forEach(e => {
      const medsStr = (e.meds||[]).map(m => `${m.name} ${m.dose||''}${m.unit?' '+m.unit:''}`).join('; ');
      lines.push([
        e.date||'', e.time||'', e.glucose??'', e.sys??'', e.dia??'', e.spo2??'', e.hr??'',
        e.weightLbs??'', e.heightIn??'', e.waistIn??'', e.tempF??'', e.lungFluidCc??'',
        e.resp??'', e.sleep??'', e.steps??'', e.stress??'', e.bodyBattery??'', e.pain??'',
        `"${(e.emotions||'').replace(/"/g,'""')}"`, `"${(e.comments||'').replace(/"/g,'""')}"`, `"${medsStr.replace(/"/g,'""')}"`
      ].join(','));
    });

    const blob = new Blob([lines.join('\n')], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'health-data.csv';
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    console.error('CSV export failed:', err);
    alert('Export failed: ' + err.message);
  }
});

// ─────────────────────────────────────────────
// Export PDF (basic table)
document.getElementById('btnExportPDF').addEventListener('click', async () => {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Health Tracker Export", 10, 10);
    doc.text("Date: " + new Date().toLocaleString(), 10, 20);

    const entries = await getAllEntries();
    if (!entries.length) {
      doc.text("No data available", 10, 30);
    } else {
      let y = 40;
      entries.forEach(e => {
        doc.text(`${e.date || ''} ${e.time || ''} | Glucose: ${e.glucose ?? '—'} | BP: ${e.sys&&e.dia ? e.sys+'/'+e.dia : '—'}`, 10, y);
        y += 10;
      });
    }

    doc.save('health-tracker-export.pdf');
  } catch (err) {
    console.error('PDF export failed:', err);
    alert('PDF export failed: ' + err.message);
  }
});

// ─────────────────────────────────────────────
// Import CSV (basic)
document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('fileImport').click();
});

document.getElementById('fileImport').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;

  try {
    const text = await file.text();
    const lines = text.split('\n').map(l => l.split(','));
    const headers = lines[0];
    const data = lines.slice(1);

    for (const row of data) {
      if (row.length < headers.length) continue;
      const entry = {};
      headers.forEach((h,i) => {
        let v = row[i]?.trim().replace(/^"|"$/g,'');
        if (['glucose','sys','dia','spo2','hr','weightLbs','heightIn','waistIn','tempF','lungFluidCc','resp','sleep','steps','stress','bodyBattery','pain'].includes(h)) {
          v = v ? Number(v) : null;
        }
        entry[h] = v || null;
      });
      if (entry.date) await saveEntry(entry);
    }

    renderTable();
    alert('Import complete');
  } catch (err) {
    console.error('Import failed:', err);
    alert('Import failed: ' + err.message);
  }
  e.target.value = '';
});

// ─────────────────────────────────────────────
// Notifications permission
async function requestNotificationPermission() {
  if (!("Notification" in window)) return;
  if (Notification.permission === "granted") return;
  await Notification.requestPermission();
}

// Call once on load or on first save
requestNotificationPermission();

// ─────────────────────────────────────────────
// Chart (simple recent values)
let chart;
async function updateChart() {
  const entries = await getAllEntries();
  entries.sort((a,b) => new Date(a.date) - new Date(b.date));

  const labels = entries.map(e => e.date || '—');
  const glucose = entries.map(e => e.glucose ?? null);
  const hr = entries.map(e => e.hr ?? null);
  const spo2 = entries.map(e => e.spo2 ?? null);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('healthChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Glucose', data: glucose, borderColor: '#4ba3ff', fill: false },
        { label: 'HR', data: hr, borderColor: '#ff5c5c', fill: false },
        { label: 'SpO₂', data: spo2, borderColor: '#27d79b', fill: false }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });
}

// Call after renderTable
async function renderTable() {
  // ... existing table code ...
  await updateChart();
  // Basic risk chips example
  const latest = (await getAllEntries()).sort((a,b) => new Date(b.date) - new Date(a.date))[0];
  const chips = document.getElementById('riskChips');
  chips.innerHTML = '';
  if (latest) {
    const addChip = (txt, cls) => {
      const c = document.createElement('div');
      c.className = `chip ${cls}`;
      c.textContent = txt;
      chips.appendChild(c);
    };
    if (latest.glucose < 70 || latest.glucose > 180) addChip('Glucose out of range', 'danger');
    if (latest.spo2 < 92) addChip('Low SpO₂', 'danger');
    if (latest.hr < 50 || latest.hr > 110) addChip('HR abnormal', 'warn');
  }
}

// ─────────────────────────────────────────────
// PWA Install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btnInstall').style.display = 'inline-block';
});

document.getElementById('btnInstall').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  console.log('Install outcome:', outcome);
  deferredPrompt = null;
  document.getElementById('btnInstall').style.display = 'none';
});

// ─────────────────────────────────────────────
// Start
// ─────────────────────────────────────────────

(async () => {
  try {
    await initDB();
    renderTable();
    console.log("Health Tracker ready");
  } catch (err) {
    console.error("Startup failed:", err);
    alert("Failed to load app – check console");
  }
})();
</script>
</body>
</html>
