<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Health Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<!-- jsPDF -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body {
    font-family: system-ui, sans-serif;
    margin: 10px;
}
button {
    margin: 4px;
}
canvas {
    max-width: 100%;
}
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    display: none;
    align-items: center;
    justify-content: center;
}
.modal-content {
    background: white;
    padding: 16px;
    width: 90%;
    max-width: 500px;
    max-height: 90vh;
    overflow: auto;
}
.row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
hr { margin: 10px 0 }
</style>
</head>

<body>

<h2>Health Tracker</h2>

<!-- ROW 1 -->
<div class="row">
    <button id="btnRefresh">Refresh</button>
    <button id="btnFields">Select Fields</button>
    <button id="btnThresholds">Thresholds</button>
    <button id="btnAdd">Add Entry</button>
    <button id="btnOptions">Options</button>
</div>

<!-- ROW 2 -->
<div class="row">
    <button id="btnSaveCSV">Save CSV</button>
    <button id="btnSavePDF">Save PDF</button>
    <button id="btnImportCSV">Import CSV</button>
</div>

<canvas id="chart" height="120"></canvas>

<!-- ADD ENTRY -->
<div class="modal" id="addModal">
<div class="modal-content">
<h3>Add Entry</h3>
<label>Date <input type="date" id="entryDate"></label><br>
<label>Field <input id="entryField"></label><br>
<label>Value <input type="number" id="entryValue"></label><br><br>
<button onclick="addEntry()">Save</button>
<button onclick="closeModal('addModal')">Close</button>
</div>
</div>

<!-- FIELD SELECT -->
<div class="modal" id="fieldModal">
<div class="modal-content">
<h3>Fields</h3>
<div id="fieldList"></div>
<hr>
<button onclick="deleteSelectedFields()">Delete Selected</button>
<button onclick="closeModal('fieldModal')">Close</button>
</div>
</div>

<!-- THRESHOLDS -->
<div class="modal" id="thresholdModal">
<div class="modal-content">
<h3>Thresholds</h3>
<label>Field <input id="thField"></label><br>
<label>Min <input type="number" id="thMin"></label><br>
<label>Max <input type="number" id="thMax"></label><br><br>
<button onclick="saveThreshold()">Save</button>
<hr>
<div id="thresholdList"></div>
<button onclick="closeModal('thresholdModal')">Close</button>
</div>
</div>

<!-- OPTIONS -->
<div class="modal" id="optionsModal">
<div class="modal-content">
<h3>Options</h3>
<p>Reserved for future settings.</p>
<button onclick="closeModal('optionsModal')">Close</button>
</div>
</div>

<input type="file" id="csvFile" accept=".csv" hidden>

<script>
/* ===============================
   IndexedDB
================================ */
let db;
const DB_NAME = 'healthTrackerDB';
const DB_VER = 1;

const openDB = () => new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore('entries', {keyPath:'id', autoIncrement:true});
        db.createObjectStore('thresholds', {keyPath:'field'});
    };
    r.onsuccess = e => (db = e.target.result, res());
    r.onerror = () => rej();
});

/* ===============================
   Chart
================================ */
let chart;

function buildChart(entries, thresholds) {
    const fields = [...new Set(entries.map(e=>e.field))];
    const dates = [...new Set(entries.map(e=>e.date))].sort();

    const datasets = fields.map(f => ({
        label: f,
        data: dates.map(d=>{
            const e = entries.find(x=>x.field===f && x.date===d);
            return e ? e.value : null;
        }),
        borderWidth: 2
    }));

    chart && chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
        type:'line',
        data:{ labels:dates, datasets },
        options:{
            responsive:true,
            scales:{
                x:{ ticks:{ color:'black' }},
                y:{ ticks:{ color:'black' }}
            },
            plugins:{
                legend:{ labels:{ color:'black' }}
            }
        }
    });
}

/* ===============================
   Data helpers
================================ */
function getAll(store){
    return new Promise(r=>{
        const tx=db.transaction(store,'readonly')
            .objectStore(store)
            .getAll();
        tx.onsuccess=()=>r(tx.result);
    });
}

/* ===============================
   Actions
================================ */
async function refresh() {
    const e = await getAll('entries');
    const t = await getAll('thresholds');
    buildChart(e,t);
}

async function addEntry(){
    const date=entryDate.value;
    const field=entryField.value.trim();
    const value=Number(entryValue.value);
    if(!date||!field) return;
    const tx=db.transaction('entries','readwrite')
        .objectStore('entries')
        .add({date,field,value});
    tx.onsuccess=()=>{closeModal('addModal');refresh();}
}

async function openFields(){
    const e = await getAll('entries');
    const fields=[...new Set(e.map(x=>x.field))];
    fieldList.innerHTML='';
    fields.forEach(f=>{
        fieldList.innerHTML+=
        `<label><input type="checkbox" value="${f}">${f}</label><br>`;
    });
    showModal('fieldModal');
}

async function deleteSelectedFields(){
    const boxes=[...fieldList.querySelectorAll('input:checked')];
    const tx=db.transaction('entries','readwrite').objectStore('entries');
    boxes.forEach(b=>{
        tx.openCursor().onsuccess=e=>{
            const c=e.target.result;
            if(c){ if(c.value.field===b.value) c.delete(); c.continue(); }
        };
    });
    closeModal('fieldModal');
    setTimeout(refresh,300);
}

async function saveThreshold(){
    const field=thField.value.trim();
    const min=Number(thMin.value);
    const max=Number(thMax.value);
    const tx=db.transaction('thresholds','readwrite')
        .objectStore('thresholds')
        .put({field,min,max});
    tx.onsuccess=loadThresholdList;
}

async function loadThresholdList(){
    const t=await getAll('thresholds');
    thresholdList.innerHTML='';
    t.forEach(x=>{
        thresholdList.innerHTML+=
        `<div>${x.field}: ${x.min}–${x.max}
         <button onclick="delTh('${x.field}')">❌</button></div>`;
    });
}

function delTh(f){
    db.transaction('thresholds','readwrite')
      .objectStore('thresholds').delete(f);
    loadThresholdList();
    refresh();
}

/* ===============================
   CSV / PDF
================================ */
async function saveCSV(){
    const e=await getAll('entries');
    let c='date,field,value\n'+
    e.map(x=>`${x.date},${x.field},${x.value}`).join('\n');
    download(c,'data.csv','text/csv');
}

function savePDF(){
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF();
    pdf.text('Health Metrics',10,10);
    pdf.addImage(chart.toBase64Image(),'PNG',10,20,180,80);
    pdf.save('metrics.pdf');
}

function importCSV(){
    csvFile.click();
}

csvFile.onchange=e=>{
    const r=new FileReader();
    r.onload=()=>{
        const rows=r.result.split('\n').slice(1);
        const os=db.transaction('entries','readwrite')
            .objectStore('entries');
        rows.forEach(l=>{
            const [d,f,v]=l.split(',');
            if(d&&f) os.add({date:d,field:f,value:Number(v)});
        });
        refresh();
    };
    r.readAsText(e.target.files[0]);
};

/* ===============================
   UI
================================ */
const showModal=id=>document.getElementById(id).style.display='flex';
const closeModal=id=>document.getElementById(id).style.display='none';

btnRefresh.onclick=refresh;
btnFields.onclick=openFields;
btnThresholds.onclick=()=>{loadThresholdList();showModal('thresholdModal')};
btnAdd.onclick=()=>showModal('addModal');
btnOptions.onclick=()=>showModal('optionsModal');
btnSaveCSV.onclick=saveCSV;
btnSavePDF.onclick=savePDF;
btnImportCSV.onclick=importCSV;

openDB().then(refresh);
</script>

</body>
</html>
