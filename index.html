<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Health Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0b1220" />
<meta name="app-version" content="1.0.0" />

<!-- ================= Theme bootstrap (early, no flash) ================= -->
<script>
(() => {
  const saved = localStorage.getItem('HT_THEME');
  const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>

<!-- ================= PWA ================= -->
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />

<!-- ================= Styles ================= -->
<link rel="stylesheet" href="./range-slider.css" />

<!-- ================= Libraries ================= -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>

<style>
/* ================= Base (Dark) ================= */
:root{
  --bg:#0b1220; --panel:#121a2a; --muted:#8aa0c3; --text:#e6eefc;
  --accent:#4ba3ff; --danger:#ff5c5c; --warn:#ffcc66; --ok:#27d79b;
  --ring:#2a3a58; --chip:#1a2440; --btn:#1a2842; --btn-hover:#223152; --card:#0e1628;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif;
  background:linear-gradient(180deg,#0a1120,#0b1220 60%,#0d1322);
  color:var(--text);
}
header{
  position:sticky; top:0; z-index:20;
  backdrop-filter: blur(8px);
  background:rgba(9,13,24,0.6);
  border-bottom:1px solid var(--ring);
}
.wrap{max-width:1200px;margin:0 auto;padding:12px 16px;}
h1{margin:8px 0 6px;font-size:20px;font-weight:700}
.small{font-size:12px;color:var(--muted)}
.headbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}

.card{
  background:linear-gradient(180deg,rgba(26,38,64,.4),rgba(9,15,29,.6));
  border:1px solid var(--ring);
  border-radius:14px;
  padding:12px;
}
.card h2{font-size:15px;margin:0 0 10px;color:#d6e6ff}

.btn{
  background:var(--btn);
  border:1px solid #2a3b67;
  color:var(--text);
  padding:9px 12px;
  border-radius:10px;
  cursor:pointer;
}
.btn:hover{background:var(--btn-hover)}
.btn.ok{background:#113c2d;border-color:#2f8f73}
.btn.warn{background:#453312;border-color:#997a2a}
.btn.danger{background:#3a1216;border-color:#8e2b37}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:768px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{
  background:linear-gradient(180deg,#0b1326,#0a1325);
  border:1px solid var(--ring);
  border-radius:12px;
  padding:10px;
}
.kpi .label{font-size:12px;color:var(--muted)}
.kpi .value{font-size:18px;font-weight:700}

/* ================= Light Theme ================= */
html[data-theme="light"]{
  --bg:#f3f6fb; --panel:#fff; --card:#fff; --chip:#e7eefb;
  --text:#0a1220; --muted:#334866;
  --accent:#0b57ff; --ok:#0f7a5a; --warn:#b45309; --danger:#b42318;
  --ring:#b9c8de; --btn:#f7f9ff; --btn-hover:#e3ebff;
}
html[data-theme="light"] body{
  background:linear-gradient(180deg,#fff,#f1f5fb 55%,#e8effa);
}
html[data-theme="light"] header{
  background:rgba(255,255,255,.85);
}
html[data-theme="light"] .card{
  background:#fff;
  box-shadow:0 6px 20px rgba(10,18,32,.08);
}
html[data-theme="light"] .card h2{color:#0a1220}
html[data-theme="light"] .btn{
  background:#fff;
  color:#0a1220;
  border-color:#9fb2d6;
}
html[data-theme="light"] .btn.ok{background:#d9f6ec;color:#064d39}
html[data-theme="light"] .btn.warn{background:#fff1d6;color:#6a2d00}
html[data-theme="light"] .btn.danger{background:#ffe0e0;color:#6b0e0b}
html[data-theme="light"] .kpi{
  background:linear-gradient(180deg,#fff,#f4f8ff);
  border-color:#b9c8de;
}
html[data-theme="light"] .kpi .label,
html[data-theme="light"] .kpi .trend{color:#334866}
html[data-theme="light"] .kpi .value{color:#0a1220}

/* ================= Toast ================= */
.toast{
  position:fixed;bottom:16px;left:50%;
  transform:translateX(-50%);
  background:#0b1220;color:#e6eefc;
  border:1px solid #2a3a58;border-radius:12px;
  padding:10px 12px;display:none;gap:8px;z-index:50
}
.toast.show{display:flex}
</style>

<!-- ================= Deterministic version + build ================= -->
<script>
(() => {
  const v = document.querySelector('meta[name="app-version"]')?.content || '0.0.0';
  const last = localStorage.getItem('HT_VERSION');
  let build = last === v ? Number(localStorage.getItem('HT_BUILD')||0)+1 : 1;
  localStorage.setItem('HT_VERSION', v);
  localStorage.setItem('HT_BUILD', build);
  window.APP_VERSION = v;
  window.APP_BUILD = build;
})();
</script>
</head>

<body>

<header>
  <div class="wrap headbar">
    <div>
      <h1>Health Tracker</h1>
      <div class="small" id="appVersion"></div>
    </div>
    <div class="install">
      <button id="btnTheme" class="btn">🌙</button>
      <button id="btnInstall" class="btn" style="display:none">Install</button>
      <button id="btnCheckUpdates" class="btn">Check for updates</button>
    </div>
  </div>
</header>

<main class="wrap">
  <!-- KPIs -->
  <div class="kpis">
    <div class="kpi"><div class="label">Latest Glucose</div><div class="value" id="kpiGlucose">—</div></div>
    <div class="kpi"><div class="label">Latest BP</div><div class="value" id="kpiBP">—</div></div>
    <div class="kpi"><div class="label">Latest BMI</div><div class="value" id="kpiBMI">—</div></div>
    <div class="kpi"><div class="label">Latest SpO₂</div><div class="value" id="kpiSpO2">—</div></div>
  </div>

  <!-- Chart -->
  <div class="card full-width" id="chartCard">
    <div class="section-title">
      <h2>Metrics Chart</h2>
    </div>
    <div id="chartPanel" style="height:320px">
      <canvas id="metricsChart"></canvas>
    </div>
  </div>
</main>

<div id="updateToast" class="toast">
  <span>New version available.</span>
  <button class="btn ok" onclick="location.reload()">Reload</button>
</div>

<script src="./range-slider.js"></script>
<script src="./app.js" defer></script>

<!-- ================= Unified UI / Chart Logic ================= -->
<script>
(() => {
  const root = document.documentElement;

  /* Version display */
  window.addEventListener('load',()=>{
    const el=document.getElementById('appVersion');
    if(el) el.textContent=`Version ${APP_VERSION} (build ${APP_BUILD})`;
  });

  /* Theme toggle */
  const setTheme=t=>{
    root.setAttribute('data-theme',t);
    localStorage.setItem('HT_THEME',t);
    document.getElementById('btnTheme').textContent=t==='dark'?'☀️':'🌙';
    updateChart();
  };
  document.getElementById('btnTheme').onclick=()=>{
    setTheme(root.getAttribute('data-theme')==='dark'?'light':'dark');
  };

  /* Chart text colors */
  function updateChart(){
    const ch=window.Chart?.getChart?.('metricsChart');
    if(!ch) return;
    const light=root.getAttribute('data-theme')==='light';
    const text=light?'#0a1220':'#e6eefc';
    const grid=light?'rgba(10,18,32,.14)':'rgba(230,238,252,.14)';
    ch.options.plugins.legend.labels.color=text;
    Object.values(ch.options.scales||{}).forEach(s=>{
      s.ticks.color=text;
      s.title.color=text;
      s.grid.color=grid;
    });
    ch.update();
  }
  window.addEventListener('load',()=>setTimeout(updateChart,200));
})();
</script>

</body>
</html>
