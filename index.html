<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Health Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0b1220" />
<meta name="app-version" content="1.0.0" />

<!-- ===== Theme bootstrap ===== -->
<script>
(() => {
  const saved = localStorage.getItem('HT_THEME');
  const prefersDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>

<link rel="stylesheet" href="./css/base.css" />
<link rel="stylesheet" href="./css/theme-dark.css" />
<link rel="stylesheet" href="./css/theme-light.css" />
<link rel="stylesheet" href="./range-slider.css" />

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>
</head>

<body>

<header>
  <div class="wrap headbar">
    <div>
      <h1>Health Tracker</h1>
      <div id="appVersion" class="small"></div>
    </div>
    <button id="btnTheme" class="btn">🌙</button>
  </div>
</header>

<main class="wrap">

<!-- TOOLBAR -->
<div class="toolbar card">
  <div class="row">
    <button class="btn" id="btnRefresh">Refresh</button>
    <button class="btn" id="btnFields">Select Fields</button>
    <button class="btn" id="btnThresholds">Thresholds</button>
    <button class="btn ok" id="btnAdd">Add Entry</button>
    <button class="btn warn" id="btnOptions">Options</button>
    <button class="btn" id="btnSavePDF">Save PDF</button>
  </div>
</div>

<!-- CHART -->
<div class="card">
  <h2>Metrics Chart</h2>
  <canvas id="metricsChart"></canvas>
</div>

</main>

<!-- ========= MODALS ========= -->
<div class="modal" id="modalFields">
  <div class="modal-box">
    <h3>Select Fields</h3>
    <div id="fieldsBody"></div>
    <button class="btn ok" data-close>Done</button>
  </div>
</div>

<div class="modal" id="modalThresholds">
  <div class="modal-box">
    <h3>Thresholds</h3>
    <div id="thresholdBody"></div>
    <button class="btn ok" data-close>Done</button>
  </div>
</div>

<script src="./app.js" defer></script>

<!-- ========= SINGLE CONTROL SCRIPT ========= -->
<script>
(() => {
const root = document.documentElement;

/* ---------- THEME ---------- */
const btnTheme = document.getElementById('btnTheme');
btnTheme.onclick = () => {
  const t = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', t);
  localStorage.setItem('HT_THEME', t);
  btnTheme.textContent = t === 'dark' ? '☀️' : '🌙';
  patchChart();
};

/* ---------- MODALS ---------- */
const openModal = id => document.getElementById(id).classList.add('open');
document.addEventListener('click', e => {
  if (e.target.dataset.close) e.target.closest('.modal')?.classList.remove('open');
});

btnFields.onclick = () => openModal('modalFields');
btnThresholds.onclick = () => openModal('modalThresholds');

/* ---------- APP EVENTS ---------- */
btnRefresh.onclick = () => document.dispatchEvent(new Event('app:refresh'));
btnAdd.onclick = () => document.dispatchEvent(new Event('app:add-entry'));
btnOptions.onclick = () => document.dispatchEvent(new Event('app:options'));

/* ---------- PDF EXPORT ---------- */
btnSavePDF.onclick = () => {
  root.setAttribute('data-pdf-export','1');
  patchChart();
  setTimeout(() => {
    root.removeAttribute('data-pdf-export');
    patchChart();
  }, 3000);
};

/* ---------- CHART COLOR PATCH ---------- */
function patchChart() {
  const ch = Chart.getChart('metricsChart');
  if (!ch) return;

  const light =
    root.getAttribute('data-pdf-export') === '1' ||
    root.getAttribute('data-theme') === 'light';

  const text = '#000000';
  const grid = light ? 'rgba(0,0,0,.15)' : 'rgba(255,255,255,.15)';

  ch.options.plugins.legend.labels.color = text;
  Object.values(ch.options.scales).forEach(s => {
    s.ticks.color = text;
    s.title.color = text;
    s.grid.color = grid;
  });
  ch.update();
}

new MutationObserver(patchChart)
  .observe(root,{attributes:true});

})();
</script>

<style>
.modal {
  position:fixed; inset:0; background:rgba(0,0,0,.5);
  display:none; align-items:center; justify-content:center;
}
.modal.open { display:flex; }
.modal-box {
  background:var(--card-bg,#fff);
  padding:1rem; border-radius:8px; min-width:300px;
}
</style>

</body>
</html>
