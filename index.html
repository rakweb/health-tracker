<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Health Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b1220">
<meta name="app-version" content="1.0.0">

<!-- ================= Theme bootstrap (NO FLASH) ================= -->
<script>
(() => {
  const saved = localStorage.getItem('HT_THEME');
  const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute(
    'data-theme',
    saved || (prefersDark ? 'dark' : 'light')
  );
})();
</script>

<!-- ================= CSS ================= -->
<link rel="stylesheet" href="./css/base.css">
<link rel="stylesheet" href="./css/theme-dark.css">
<link rel="stylesheet" href="./css/theme-light.css">
<link rel="stylesheet" href="./range-slider.css">

<!-- ================= PWA ================= -->
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="./icons/icon-192.png">

<!-- ================= Libraries ================= -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>

<!-- ================= Version + Build ================= -->
<script>
(() => {
  const v = document.querySelector('meta[name="app-version"]').content;
  const last = localStorage.getItem('HT_VERSION');
  const build = last === v ? (Number(localStorage.getItem('HT_BUILD')||0)+1) : 1;
  localStorage.setItem('HT_VERSION', v);
  localStorage.setItem('HT_BUILD', build);
  window.APP_VERSION = v;
  window.APP_BUILD = build;
})();
</script>
</head>

<body>

<header>
  <div class="wrap headbar">
    <div>
      <h1>Health Tracker</h1>
      <div class="small" id="appVersion"></div>
    </div>
    <div class="install">
      <button id="btnTheme" class="btn">🌙</button>
      <button id="btnCheckUpdates" class="btn">Check for updates</button>
    </div>
  </div>
</header>

<main class="wrap">

<div class="toolbar card">
  <div class="row">
    <button class="btn" id="btnFields">Select Fields</button>
    <button class="btn" id="btnThresholds">Thresholds</button>
    <button class="btn" id="btnSavePDF">Save PDF</button>
  </div>
</div>

<div class="card full-width" id="chartCard">
  <h2>Metrics Chart</h2>
  <canvas id="metricsChart"></canvas>
</div>

</main>

<!-- ================= Modals ================= -->
<div class="modal-backdrop" id="fieldsModal"></div>
<div class="modal-backdrop" id="thModal"></div>

<!-- ================= App Scripts ================= -->
<script src="./range-slider.js"></script>
<script src="./app.js"></script>

<!-- =========================================================
     ✅ SINGLE, DEFINITIVE CHART + PDF FIX
     ========================================================= -->
<script>
(() => {
  const root = document.documentElement;

  /* ---------- Chart.js plugin: FORCE BLACK DURING PDF ---------- */
  const PdfBlackTextPlugin = {
    id: 'pdfBlackText',
    beforeLayout(chart) {
      if (root.getAttribute('data-pdf-export') !== '1') return;

      const BLACK = '#000000';

      // Legend
      if (chart.options.plugins?.legend?.labels) {
        chart.options.plugins.legend.labels.color = BLACK;
      }

      // Scales
      if (chart.options.scales) {
        Object.values(chart.options.scales).forEach(scale => {
          scale.ticks = scale.ticks || {};
          scale.title = scale.title || {};
          scale.grid  = scale.grid  || {};
          scale.ticks.color = BLACK;
          scale.title.color = BLACK;
        });
      }

      chart.options.color = BLACK;
    }
  };

  Chart.register(PdfBlackTextPlugin);

  /* ---------- PDF export hook ---------- */
  window.addEventListener('load', () => {
    const btn = document.getElementById('btnSavePDF');
    if (!btn) return;

    btn.addEventListener('click', () => {
      root.setAttribute('data-pdf-export', '1');

      const ch = Chart.getChart('metricsChart');
      if (ch) {
        ch.update('none'); // force redraw with plugin active
      }

      // restore after PDF capture
      setTimeout(() => {
        root.removeAttribute('data-pdf-export');
        if (ch) ch.update('none');
      }, 4000);
    }, true); // capture phase
  });

  /* ---------- Guaranteed button behavior ---------- */
  document.getElementById('btnFields').onclick = () => {
    window.UI?.openFields?.() ||
    document.getElementById('fieldsModal')?.classList.add('show');
  };

  document.getElementById('btnThresholds').onclick = () => {
    window.UI?.openThresholds?.() ||
    document.getElementById('thModal')?.classList.add('show');
  };

  /* ---------- Theme button ---------- */
  document.getElementById('btnTheme').onclick = () => {
    const t = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', t);
    localStorage.setItem('HT_THEME', t);
  };

  /* ---------- Version label ---------- */
  window.addEventListener('load', () => {
    document.getElementById('appVersion').textContent =
      `Version ${APP_VERSION} (build ${APP_BUILD})`;
  });

})();
</script>

</body>
</html>
